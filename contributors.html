<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Alpaca Codetective — Contributors</title>
<link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
<link rel="stylesheet" href="/static/snippet-finder.css">
<style>
:root{
  --bg:#faf8f3; --surface:#fff; --border:#ece8de; --border-strong:#d6d0c0;
  --text:#181c1f; --dim:#6b6b6b; --faint:#9b9588;
  --accent:#6366f1; --accent-bg:#eef2ff;
  --green:#059669; --green-bg:#ecfdf5;
  --amber:#b45309; --amber-bg:#fef3c7;
  --rose:#be123c; --rose-bg:#ffe4e6;
  --alpaca-yellow:#FFD400;
  --alpaca-yellow-soft:#FFF3B0;
  --alpaca-gold:#C8941A;
  --alpaca-gold-bg:#FCEBA9;
  --alpaca-cream:#FBF6E8;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
.mono{font-family:"SF Mono","Fira Code",ui-monospace,monospace}

/* ===== Top bar ===== */
.topbar{background:linear-gradient(180deg,var(--alpaca-cream) 0%,var(--surface) 100%);
  border-bottom:1px solid var(--border);
  padding:14px 32px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:5}
.topbar::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--alpaca-yellow) 0%,var(--alpaca-gold) 60%,var(--alpaca-yellow) 100%)}
.logo{width:30px;height:30px;border-radius:7px;display:block;object-fit:cover;
  background:#fff;box-shadow:0 0 0 1.5px var(--alpaca-yellow),0 1px 3px rgba(184,132,26,.18)}
.brand-name{font-weight:800;letter-spacing:-.02em;font-size:16px;line-height:1;
  display:inline-flex;align-items:baseline;user-select:none}
.brand-name .b-accent{color:var(--alpaca-gold);font-style:italic;font-weight:600;letter-spacing:-.01em}
.topbar .crumbs{color:var(--faint);font-size:12px;margin-left:8px}
.topbar .crumbs a{color:var(--dim)}
.topbar .spacer{flex:1}
.topbar .stat{font-size:12px;color:var(--dim)}
.topbar .stat strong{color:var(--text);font-weight:600}
.back-link{font-size:12px;color:var(--dim);font-weight:500}
.back-link:hover{color:var(--text);text-decoration:none}

.content{max-width:1200px;margin:0 auto;padding:24px 32px 64px}

/* ===== List view ===== */
.list-head{display:flex;align-items:baseline;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.list-head h1{font-size:22px;font-weight:700;letter-spacing:-.02em}
.list-head .count{font-size:12.5px;color:var(--dim);font-weight:500}

.metrics{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:8px 14px;display:flex;flex-direction:column;gap:0px;min-width:90px}
.metric .v{font-size:16px;font-weight:700;color:var(--text);line-height:1.2}
.metric .l{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);margin-top:2px}

.toolbar{display:flex;gap:10px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.toolbar input{flex:1;min-width:240px;height:36px;border:1px solid var(--border);border-radius:8px;
  padding:0 12px;background:var(--surface);outline:none;font-size:13px;transition:border-color .12s}
.toolbar input:focus{border-color:var(--accent)}
.seg{display:flex;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--surface)}
.seg button{height:36px;padding:0 14px;border:none;background:transparent;
  font-size:12px;font-weight:500;color:var(--dim);cursor:pointer;border-right:1px solid var(--border);transition:.1s}
.seg button:last-child{border-right:none}
.seg button.on{background:var(--text);color:#fff}
.seg button:hover:not(.on){color:var(--text)}

.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;padding:10px 12px;
  background:var(--surface);border:1px solid var(--border);border-radius:8px}
.chip{font-size:11.5px;padding:4px 10px;border-radius:14px;background:var(--bg);color:var(--dim);
  cursor:pointer;border:1px solid transparent;font-weight:500;transition:.1s;white-space:nowrap}
.chip:hover{background:var(--alpaca-yellow-soft);color:var(--alpaca-gold);border-color:var(--alpaca-gold-bg)}
.chip.on{background:var(--alpaca-yellow);color:var(--text);border-color:var(--alpaca-gold);font-weight:600}
.chip .n{opacity:.7;font-weight:400;margin-left:4px}
.chip.on .n{opacity:.85}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:10px}
.ccard{background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:13px;cursor:pointer;transition:border-color .12s,transform .12s,box-shadow .12s;
  display:flex;gap:12px;align-items:flex-start;position:relative}
.ccard:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 12px rgba(99,102,241,.08)}
.ccard.zero{opacity:.55}
.ccard.unresolved{background:var(--bg);border-style:dashed}

.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:700;font-size:12.5px;flex-shrink:0;position:relative}
.av .dot{position:absolute;bottom:-1px;right:-1px;width:11px;height:11px;border-radius:50%;
  border:2px solid var(--surface)}
.dot.active{background:#10b981}
.dot.recent{background:#f59e0b}
.dot.dormant{background:#9ca3af}

.ccard .meta{flex:1;min-width:0}
.ccard .name-row{display:flex;align-items:center;gap:6px}
.ccard .name{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.ccard .login{font-size:11.5px;color:var(--dim);font-family:"SF Mono",ui-monospace,monospace;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.ccard .last{font-size:10.5px;color:var(--faint);margin-top:1px;white-space:nowrap}
.ccard .stats{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap;align-items:center}
.pill{font-size:10.5px;padding:2px 8px;border-radius:10px;font-weight:500;
  display:inline-flex;align-items:center;gap:4px;line-height:1.5}
.pill.commits{background:var(--accent-bg);color:var(--accent);font-weight:600}
.pill.team{background:var(--green-bg);color:var(--green);cursor:pointer}
.pill.team:hover{background:var(--green);color:#fff}
.pill.muted{background:var(--bg);color:var(--faint)}

.empty-state{text-align:center;padding:64px 16px;color:var(--dim)}
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  color:var(--faint);margin:24px 0 10px;display:flex;align-items:center;gap:8px}
.section-label .desc{text-transform:none;font-weight:400;letter-spacing:0;color:var(--faint)}

.team-group{margin-bottom:22px}
.team-group-head{display:flex;align-items:baseline;gap:10px;margin-bottom:8px;padding:0 2px}
.team-group-head h3{font-size:14px;font-weight:700;color:var(--text)}
.team-group-head .meta{font-size:11.5px;color:var(--dim)}

/* ===== Detail view ===== */
.detail{display:grid;grid-template-columns:1fr 300px;gap:24px}
.detail-main{min-width:0}
.profile-head{background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:22px;display:flex;gap:20px;align-items:flex-start;margin-bottom:16px}
.av-lg{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:700;font-size:24px;flex-shrink:0}
.profile-meta{flex:1;min-width:0}
.profile-meta h1{font-size:22px;font-weight:700;letter-spacing:-.01em;margin-bottom:4px}
.profile-meta .login{font-family:"SF Mono",ui-monospace,monospace;font-size:13px;color:var(--dim)}
.profile-meta .login a{color:var(--dim)}.profile-meta .login a:hover{color:var(--text)}
.profile-stats{display:flex;gap:18px;margin-top:14px;flex-wrap:wrap}
.stat-item{display:flex;flex-direction:column;gap:2px}
.stat-item .v{font-size:17px;font-weight:700;color:var(--text)}
.stat-item .l{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--faint)}

.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:14px}
.card h3{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  color:var(--faint);margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.card h3 .hint{font-size:11px;font-weight:500;color:var(--dim);text-transform:none;letter-spacing:0}

.file-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.file-row:last-child{border-bottom:none}
.file-row .path{flex:1;font-family:"SF Mono",ui-monospace,monospace;font-size:12px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;direction:rtl;text-align:left}
.file-row .path:hover{color:var(--accent);cursor:pointer;text-decoration:underline}
.file-row .touches{font-size:11px;color:var(--dim);flex-shrink:0}
.file-row .touches strong{color:var(--text);font-weight:700}
.bar{flex:1;height:4px;background:var(--bg);border-radius:2px;overflow:hidden;max-width:80px}
.bar .fill{height:100%;background:var(--accent)}

.commit-row{padding:10px 0;border-bottom:1px solid var(--border)}
.commit-row:last-child{border-bottom:none}
.commit-row .subj{font-size:12.5px;line-height:1.4}
.commit-row .subj a{color:var(--text)}.commit-row .subj a:hover{color:var(--accent)}
.commit-row .meta-line{font-size:11px;color:var(--dim);margin-top:3px;display:flex;gap:10px}
.commit-row .meta-line .sha{font-family:"SF Mono",ui-monospace,monospace}

.sidebar-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.sidebar-card h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  color:var(--faint);margin-bottom:10px}
.sidebar-card ul{list-style:none;display:flex;flex-direction:column;gap:8px}
.sidebar-card li{font-size:12.5px}

.skeleton{background:var(--bg);border-radius:6px;height:14px;width:60%;margin:6px 0}

/* Profile summary card (LLM-generated) */
.summary-card{background:linear-gradient(180deg,var(--alpaca-cream) 0%,var(--surface) 100%);
  border:1px solid var(--alpaca-gold-bg);border-radius:10px;padding:18px 20px;margin-bottom:14px;
  position:relative;box-shadow:0 1px 0 rgba(184,132,26,.04)}
.summary-card .sc-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.summary-card .sc-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--faint)}
.summary-card .sc-model{font-size:10px;color:var(--faint);background:var(--bg);
  padding:2px 7px;border-radius:10px;font-weight:500;display:inline-flex;align-items:center;gap:4px}
.summary-card .sc-model::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--green)}
.summary-card .sc-prose{font-size:13.5px;line-height:1.55;color:var(--text)}
.summary-card .sc-loading{font-size:12px;color:var(--dim);font-style:italic}
.summary-card .sc-offline{font-size:12px;color:var(--amber);background:var(--amber-bg);
  padding:8px 10px;border-radius:6px;display:inline-block}
.summary-card .sc-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px}
.summary-card .sc-tag{font-size:10.5px;padding:3px 9px;border-radius:10px;
  background:var(--accent-bg);color:var(--accent);font-weight:500}
.summary-card .sc-themes{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);
  display:flex;flex-direction:column;gap:5px}
.summary-card .sc-theme{font-size:12px;color:var(--dim);line-height:1.4;display:flex;gap:6px}
.summary-card .sc-theme::before{content:"›";color:var(--accent);font-weight:600;flex-shrink:0}
.shimmer{background:linear-gradient(90deg,var(--bg) 0%,#f0f1f5 50%,var(--bg) 100%);
  background-size:200% 100%;animation:shimmer 1.4s ease-in-out infinite;border-radius:4px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.loading{padding:40px;text-align:center;color:var(--dim)}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--border-strong);
  border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

.hidden{display:none !important}
</style>
</head>
<body>

<div class="topbar">
  <img class="logo" src="/static/icon-192.png" alt="Codetective">
  <div class="brand-name">Code<span class="b-accent">tective</span></div>
  <div class="crumbs"><a href="/">Investigate</a> · <span id="crumb-current">Contributors</span></div>
  <div class="spacer"></div>
  <div class="stat" id="topstat"></div>
  <a class="back-link" href="/" id="backlink">← Back to investigate</a>
</div>

<div class="content" id="content">
  <div class="loading"><span class="spin"></span>Loading…</div>
</div>

<script>
const PAL = ["#6366f1","#06b6d4","#22c55e","#f97316","#ec4899","#8b5cf6","#0ea5e9","#10b981","#eab308","#f43f5e"];
const $ = id => document.getElementById(id);
const esc = s => String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const initials = s => (s||"?").split(/\s+/).filter(Boolean).map(w=>w[0]).join("").slice(0,2).toUpperCase() || "?";
const color = s => PAL[Math.abs(Array.from(s||"").reduce((a,c)=>a+c.charCodeAt(0),0)) % PAL.length];
const daysSince = iso => {
  if (!iso) return Infinity;
  return Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
};
const agoDays = iso => {
  const d = daysSince(iso);
  if (!isFinite(d)) return "";
  if (d < 1) return "today";
  if (d < 30) return d+"d ago";
  if (d < 365) return Math.floor(d/30)+"mo ago";
  return Math.floor(d/365)+"y ago";
};
const activityClass = iso => {
  const d = daysSince(iso);
  if (d <= 30) return "active";
  if (d <= 180) return "recent";
  return "dormant";
};
const activityLabel = iso => {
  const d = daysSince(iso);
  if (d <= 30) return "active";
  if (d <= 180) return "recent";
  if (!isFinite(d)) return "";
  return "dormant";
};
const fmtInt = n => (n||0).toLocaleString();

// view: "all" | "team"
const state = {mode:"list", data:null, filter:"", sort:"commits", view:"all", teamSlug:""};

async function load() {
  const params = new URLSearchParams(location.search);
  const login = params.get("login");
  if (login) {
    state.mode = "detail";
    await loadDetail(login);
  } else {
    state.mode = "list";
    await loadList();
  }
}

async function loadList() {
  $("crumb-current").textContent = "Contributors";
  try {
    const r = await fetch("/api/contributors");
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    state.data = await r.json();
  } catch(e) {
    $("content").innerHTML = `<div class="empty-state">Failed to load contributors: ${esc(e.message)}</div>`;
    return;
  }
  $("topstat").innerHTML = `<strong>${fmtInt(state.data.resolved_count)}</strong> resolved · <strong>${fmtInt(state.data.unresolved_count)}</strong> unmatched`;
  renderList();
}

function renderList() {
  const d = state.data;
  const f = state.filter.toLowerCase().trim();
  const teamFilt = c => !state.teamSlug || (c.team_slugs||[]).includes(state.teamSlug);
  const textFilt = c => !f ||
    (c.login||"").toLowerCase().includes(f) ||
    (c.name||"").toLowerCase().includes(f) ||
    (c.teams||[]).some(t => t.toLowerCase().includes(f));
  const filt = c => teamFilt(c) && textFilt(c);

  let resolved = d.contributors.filter(filt);
  const unmatched = state.teamSlug ? [] : d.unmatched.filter(c =>
    !f ||
    (c.name||"").toLowerCase().includes(f) ||
    (c.email||"").toLowerCase().includes(f));

  if (state.sort === "commits") {
    resolved.sort((a,b) => b.commits - a.commits);
  } else if (state.sort === "name") {
    resolved.sort((a,b) => (a.name||a.login).localeCompare(b.name||b.login));
  } else if (state.sort === "recent") {
    resolved.sort((a,b) => (b.last_active||"").localeCompare(a.last_active||""));
  }

  const withCommits = resolved.filter(c => c.commits > 0);
  const noCommits = resolved.filter(c => c.commits === 0);

  // ---- metrics strip ----
  const totalCommitters = d.resolved_count;
  const activeCount = d.contributors.filter(c => c.commits>0 && daysSince(c.last_active)<=30).length;
  const teamsWithCommitters = d.teams.filter(t => t.committer_count>0).length;

  // ---- team chips ----
  const visibleTeams = d.teams.filter(t => t.committer_count > 0);
  const chipsHtml = `
    <div class="chips">
      <span class="chip ${state.teamSlug===''?'on':''}" onclick="setTeam('')">All<span class="n">${totalCommitters}</span></span>
      ${visibleTeams.map(t =>
        `<span class="chip ${state.teamSlug===t.slug?'on':''}" onclick="setTeam('${esc(t.slug)}')" title="${esc(t.members_count)} total members">${esc(t.name)}<span class="n">${t.committer_count}</span></span>`
      ).join("")}
    </div>`;

  // ---- main list area ----
  let listArea = "";
  if (state.view === "team" && !state.teamSlug) {
    // Group cards under each team header.
    listArea = visibleTeams.map(t => {
      const members = withCommits.filter(c => (c.team_slugs||[]).includes(t.slug))
        .sort((a,b)=>b.commits-a.commits);
      if (!members.length) return "";
      return `<div class="team-group">
        <div class="team-group-head">
          <h3>${esc(t.name)}</h3>
          <span class="meta">${members.length} of ${t.members_count} members active in gobroker</span>
        </div>
        <div class="grid">${members.map(cardHtml).join("")}</div>
      </div>`;
    }).join("");
    // Engineers without a team — show them in a tail group.
    const teamless = withCommits.filter(c => !(c.team_slugs||[]).length);
    if (teamless.length) {
      listArea += `<div class="team-group">
        <div class="team-group-head">
          <h3>No team</h3>
          <span class="meta">${teamless.length} committers — likely departed or external</span>
        </div>
        <div class="grid">${teamless.map(cardHtml).join("")}</div>
      </div>`;
    }
  } else {
    if (withCommits.length) listArea = `<div class="grid">${withCommits.map(cardHtml).join("")}</div>`;
    if (unmatched.length) {
      listArea += `<div class="section-label">Unmatched git authors (${unmatched.length})
        <span class="desc">↳ can't resolve to a GitHub login (private org membership, contractor, or departed)</span></div>
      <div class="grid">${unmatched.map(unmatchedCardHtml).join("")}</div>`;
    }
    if (noCommits.length && !state.teamSlug) {
      listArea += `<div class="section-label">Org members with no gobroker commits (${noCommits.length})</div>
      <div class="grid">${noCommits.map(cardHtml).join("")}</div>`;
    }
  }

  if (!withCommits.length && !unmatched.length && !noCommits.length) {
    listArea = `<div class="empty-state">No contributors match this filter.</div>`;
  }

  const filterContext = state.teamSlug
    ? `${withCommits.length} ${withCommits.length===1?'engineer':'engineers'} on this team committed to gobroker`
    : `${fmtInt(d.resolved_count)} engineers with gobroker commits · ${fmtInt(d.contributors.length)} total in org`;

  $("content").innerHTML = `
    <div class="list-head">
      <h1>Contributors</h1>
      <span class="count">${filterContext}</span>
    </div>
    <div class="metrics">
      <div class="metric"><div class="v">${fmtInt(totalCommitters)}</div><div class="l">Committers</div></div>
      <div class="metric"><div class="v">${fmtInt(activeCount)}</div><div class="l">Active &lt;30d</div></div>
      <div class="metric"><div class="v">${fmtInt(teamsWithCommitters)}</div><div class="l">Teams</div></div>
      <div class="metric"><div class="v">${fmtInt(d.unresolved_count)}</div><div class="l">Unresolved authors</div></div>
    </div>
    <div class="toolbar">
      <input id="q" placeholder="Filter by name, login, or team…" value="${esc(state.filter)}" autofocus>
      <div class="seg">
        <button class="${state.view==='all'?'on':''}" onclick="setView('all')">All</button>
        <button class="${state.view==='team'?'on':''}" onclick="setView('team')">By team</button>
      </div>
      <div class="seg">
        <button class="${state.sort==='commits'?'on':''}" onclick="setSort('commits')">Top committers</button>
        <button class="${state.sort==='recent'?'on':''}" onclick="setSort('recent')">Recent activity</button>
        <button class="${state.sort==='name'?'on':''}" onclick="setSort('name')">Name</button>
      </div>
    </div>
    ${chipsHtml}
    ${listArea}
  `;

  const q = $("q");
  if (q) {
    q.addEventListener("input", e => {
      state.filter = e.target.value;
      renderList();
      $("q").focus();
      $("q").setSelectionRange(state.filter.length, state.filter.length);
    });
  }
}

function cardHtml(c) {
  const zero = c.commits === 0;
  const teamsHtml = (c.teams||[]).slice(0,2).map(t => `<span class="pill team" onclick="event.stopPropagation();setTeamByName('${esc(t)}')">${esc(t)}</span>`).join("");
  const moreTeams = (c.teams||[]).length > 2 ? `<span class="pill muted" title="${esc((c.teams||[]).slice(2).join(', '))}">+${c.teams.length-2}</span>` : "";
  const dotCls = zero ? "" : activityClass(c.last_active);
  const dotHtml = (!zero && dotCls) ? `<span class="dot ${dotCls}" title="${activityLabel(c.last_active)}"></span>` : "";
  const lastHtml = (c.last_active && !zero) ? `<div class="last">last commit ${agoDays(c.last_active)}</div>` : "";
  return `<div class="ccard ${zero?'zero':''}" onclick="goDetail('${esc(c.login)}')">
    <div class="av" style="background:${color(c.login)}">${initials(c.name||c.login)}${dotHtml}</div>
    <div class="meta">
      <div class="name-row"><div class="name">${esc(c.name || c.login)}</div></div>
      <div class="login">@${esc(c.login)}</div>
      ${lastHtml}
      <div class="stats">
        ${zero ? `<span class="pill muted">no commits</span>` : `<span class="pill commits">${fmtInt(c.commits)} commits</span>`}
        ${teamsHtml}${moreTeams}
      </div>
    </div>
  </div>`;
}

function unmatchedCardHtml(c) {
  return `<div class="ccard unresolved">
    <div class="av" style="background:${color(c.email||c.name)}">${initials(c.name)}</div>
    <div class="meta">
      <div class="name">${esc(c.name)}</div>
      <div class="login">${esc(c.email)}</div>
      <div class="last">last commit ${agoDays(c.last_active)}</div>
      <div class="stats">
        <span class="pill commits">${fmtInt(c.commits)} commits</span>
      </div>
    </div>
  </div>`;
}

function setSort(s) { state.sort = s; renderList(); }
function setView(v) { state.view = v; renderList(); }
function setTeam(slug) { state.teamSlug = slug; renderList(); window.scrollTo({top:0,behavior:'smooth'}); }
function setTeamByName(name) {
  const t = (state.data.teams||[]).find(t => t.name === name);
  if (t) setTeam(t.slug);
}
function goDetail(login) { location.href = `/contributors?login=${encodeURIComponent(login)}`; }

async function loadDetail(login) {
  $("crumb-current").innerHTML = `<a href="/contributors">Contributors</a> · @${esc(login)}`;
  $("content").innerHTML = `<div class="loading"><span class="spin"></span>Loading profile for @${esc(login)}…</div>`;
  try {
    const r = await fetch(`/api/contributors/${encodeURIComponent(login)}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    state.data = await r.json();
    renderDetail();
    // Kick off summary fetch in parallel — it can take ~5s on a local LLM,
    // so we render the shell + git data immediately and stream this in.
    fetchSummary(login);
  } catch(e) {
    $("content").innerHTML = `<div class="empty-state">Failed to load profile: ${esc(e.message)}
      <br><br><a href="/contributors">← Back to list</a></div>`;
  }
}

async function fetchSummary(login) {
  try {
    const r = await fetch(`/api/contributors/${encodeURIComponent(login)}/summary`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const s = await r.json();
    renderSummary(s);
  } catch(e) {
    renderSummary({summary:"", reason:`fetch failed: ${e.message}`, llm_used:false});
  }
}

function renderSummary(s) {
  const el = $("summary-card");
  if (!el) return;
  if (!s.llm_used || !s.summary) {
    const reason = s.reason || "no summary available";
    if (reason === "no recent activity to summarize") {
      el.innerHTML = `
        <div class="sc-head">
          <span class="sc-title">Profile summary</span>
        </div>
        <div class="sc-prose" style="color:var(--dim);font-style:italic">
          Not enough gobroker activity to summarize. This person has no recent commits
          or top files in the cached history.
        </div>`;
    } else {
      el.innerHTML = `
        <div class="sc-head">
          <span class="sc-title">Profile summary</span>
        </div>
        <div class="sc-offline">
          Local LLM offline — summary unavailable. Start Ollama and pull a model to
          enable this section: <span class="mono">brew services start ollama &amp;&amp; ollama pull qwen2.5-coder:3b</span>
        </div>`;
    }
    return;
  }
  const tagsHtml = (s.focus_areas||[]).map(t => `<span class="sc-tag">${esc(t)}</span>`).join("");
  const themesHtml = (s.recent_themes||[]).map(t => `<div class="sc-theme">${esc(t)}</div>`).join("");
  el.innerHTML = `
    <div class="sc-head">
      <span class="sc-title">Profile summary</span>
      <span class="sc-model">local · ${esc(s.model || "model")}</span>
    </div>
    <div class="sc-prose">${esc(s.summary)}</div>
    ${tagsHtml ? `<div class="sc-tags">${tagsHtml}</div>` : ""}
    ${themesHtml ? `<div class="sc-themes">${themesHtml}</div>` : ""}
  `;
}

function renderDetail() {
  const d = state.data;
  const s = d.stats;
  const maxTouches = Math.max(1, ...(d.top_files||[]).map(f => f.commits));

  const topFilesHtml = (d.top_files||[]).length ?
    d.top_files.map(f => `
      <div class="file-row">
        <div class="path" title="${esc(f.path)}" onclick="location.href='/?path=${encodeURIComponent(f.path)}'">${esc(f.path)}</div>
        <div class="bar"><div class="fill" style="width:${(f.commits/maxTouches*100).toFixed(0)}%"></div></div>
        <div class="touches"><strong>${fmtInt(f.commits)}</strong> touches</div>
      </div>`).join("") :
    `<div style="color:var(--dim);font-size:12px;padding:8px 0">No commits found in gobroker.</div>`;

  const commitsHtml = (d.recent_commits||[]).length ?
    d.recent_commits.map(c => `
      <div class="commit-row">
        <div class="subj"><a href="${esc(c.url)}" target="_blank" rel="noopener">${esc(c.subject)}</a></div>
        <div class="meta-line">
          <span class="sha">${esc(c.sha)}</span>
          <span>${esc(c.date)}</span>
          <span>${c.files_touched} file${c.files_touched===1?'':'s'}</span>
        </div>
      </div>`).join("") :
    `<div style="color:var(--dim);font-size:12px;padding:8px 0">No recent commits.</div>`;

  const teamsHtml = (d.teams||[]).length ?
    `<ul>${d.teams.map(t => `<li>${t.html_url?`<a href="${esc(t.html_url)}" target="_blank" rel="noopener">${esc(t.name)}</a>`:esc(t.name)}</li>`).join("")}</ul>` :
    `<div style="color:var(--dim);font-size:12px">No team membership found in cached gh_teams data. Team data is populated lazily as routed investigations run.</div>`;

  const emailsHtml = (d.emails||[]).length ?
    `<ul>${d.emails.map(e => `<li class="mono" style="font-size:11.5px;color:var(--dim)">${esc(e)}</li>`).join("")}</ul>` :
    `<div style="color:var(--faint);font-size:12px">—</div>`;

  $("topstat").innerHTML = d.in_org
    ? `<strong>${esc(d.name || d.login)}</strong> · alpacahq member`
    : `<strong>${esc(d.name || d.login)}</strong> · <span style="color:var(--amber)">not in org roster</span>`;

  $("content").innerHTML = `
    <div style="margin-bottom:14px"><a href="/contributors" style="font-size:12px;color:var(--dim)">← All contributors</a></div>
    <div class="profile-head">
      <div class="av-lg" style="background:${color(d.login)}">${initials(d.name||d.login)}</div>
      <div class="profile-meta">
        <h1>${esc(d.name || d.login)}</h1>
        <div class="login">@${esc(d.login)} · <a href="${esc(d.github_url)}" target="_blank" rel="noopener">GitHub ↗</a></div>
        <div class="profile-stats">
          <div class="stat-item"><div class="v">${fmtInt(s.total_commits)}</div><div class="l">Total commits</div></div>
          <div class="stat-item"><div class="v">${fmtInt(s.commits_30d)}</div><div class="l">Last 30 days</div></div>
          <div class="stat-item"><div class="v">${fmtInt(s.commits_90d)}</div><div class="l">Last 90 days</div></div>
          <div class="stat-item"><div class="v">${s.first_commit?agoDays(s.first_commit):'—'}</div><div class="l">First seen</div></div>
          <div class="stat-item"><div class="v">${s.last_commit?agoDays(s.last_commit):'—'}</div><div class="l">Last active</div></div>
        </div>
      </div>
    </div>

    <div class="detail">
      <div class="detail-main">
        <div class="summary-card" id="summary-card">
          <div class="sc-head">
            <span class="sc-title">Profile summary</span>
            <span class="sc-loading">generating from gobroker activity…</span>
          </div>
          <div class="shimmer" style="height:14px;width:90%;margin-bottom:8px"></div>
          <div class="shimmer" style="height:14px;width:75%;margin-bottom:8px"></div>
          <div class="shimmer" style="height:14px;width:60%"></div>
        </div>
        <div class="card">
          <h3>Top files <span class="hint">by commits touching each path (last ~80 commits)</span></h3>
          ${topFilesHtml}
        </div>
        <div class="card">
          <h3>Recent commits <span class="hint">click to open on GitHub</span></h3>
          ${commitsHtml}
        </div>
      </div>
      <div class="detail-side">
        <div class="sidebar-card">
          <h4>Teams</h4>
          ${teamsHtml}
        </div>
        <div class="sidebar-card">
          <h4>Git author emails</h4>
          ${emailsHtml}
        </div>
      </div>
    </div>
  `;
}

window.addEventListener("popstate", load);
load();
</script>
<script src="/static/snippet-finder.js" defer></script>
</body>
</html>
