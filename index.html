<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Alpaca Codetective</title>
<link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
<link rel="stylesheet" href="/static/snippet-finder.css">
<style>
:root{
  --bg:#faf8f3; --surface:#fff; --border:#ece8de; --border-strong:#d6d0c0;
  --text:#181c1f; --dim:#6b6b6b; --faint:#9b9588;
  --accent:#6366f1; --accent-bg:#eef2ff;
  --green:#059669; --green-bg:#ecfdf5;
  --amber:#b45309; --amber-bg:#fef3c7;
  --rose:#be123c; --rose-bg:#ffe4e6;
  --code-bg:#0f172a; --code-fg:#e2e8f0;
  /* Alpaca brand */
  --alpaca-yellow:#FFD400;
  --alpaca-yellow-soft:#FFF3B0;
  --alpaca-gold:#C8941A;
  --alpaca-gold-bg:#FCEBA9;
  --alpaca-cream:#FBF6E8;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
button,input{font:inherit;color:inherit}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
.mono{font-family:"SF Mono","Fira Code",ui-monospace,monospace}

.app{display:grid;grid-template-columns:340px 1fr;height:100vh}

/* ===== Left rail ===== */
.rail{border-right:1px solid var(--border);background:var(--surface);
  display:flex;flex-direction:column;overflow:hidden;position:relative}
.rail::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--alpaca-yellow) 0%,var(--alpaca-gold) 60%,var(--alpaca-yellow) 100%);
  z-index:1}
.rail-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;
  background:linear-gradient(180deg,var(--alpaca-cream) 0%,var(--surface) 100%)}
.logo{width:28px;height:28px;border-radius:7px;display:block;object-fit:cover;
  background:#fff;box-shadow:0 0 0 1.5px var(--alpaca-yellow),0 1px 3px rgba(184,132,26,.18)}
.brand-name{font-weight:800;letter-spacing:-.02em;font-size:15.5px;line-height:1;
  display:inline-flex;align-items:baseline;user-select:none}
.brand-name .b-accent{color:var(--alpaca-gold);font-style:italic;font-weight:600;letter-spacing:-.01em}
.tag{margin-left:auto;font-size:10px;font-weight:700;color:var(--alpaca-gold);
  background:var(--alpaca-yellow-soft);border:1px solid var(--alpaca-gold-bg);
  border-radius:5px;padding:2px 7px;letter-spacing:.02em}

/* Repo switcher (dropdown around the sidebar tag) */
.repo-switch{position:relative;margin-left:auto}
.repo-switch-btn{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;
  color:var(--alpaca-gold);background:var(--alpaca-yellow-soft);
  border:1px solid var(--alpaca-gold-bg);border-radius:5px;padding:2px 4px 2px 7px;
  letter-spacing:.02em;cursor:pointer;transition:.12s;font-family:inherit}
.repo-switch-btn:hover{background:var(--alpaca-yellow);border-color:var(--alpaca-gold);color:#5a3e08}
.repo-switch-btn[aria-expanded="true"]{background:var(--alpaca-yellow);border-color:var(--alpaca-gold);color:#5a3e08}
.repo-switch-btn .rs-chevron{font-size:8px;opacity:.7;transition:transform .15s}
.repo-switch-btn[aria-expanded="true"] .rs-chevron{transform:rotate(180deg)}
.repo-menu{position:absolute;top:calc(100% + 6px);right:0;z-index:50;min-width:220px;
  background:var(--surface);border:1px solid var(--border);border-radius:9px;
  box-shadow:0 6px 24px rgba(20,16,8,.10),0 2px 6px rgba(20,16,8,.06);
  padding:6px;display:none;animation:rs-fadein .12s ease-out}
.repo-menu.open{display:block}
@keyframes rs-fadein{from{opacity:0;transform:translateY(-2px)}to{opacity:1;transform:none}}
.repo-menu-head{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
  color:var(--faint);padding:6px 10px 4px}
.repo-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;
  font-size:12px;cursor:pointer;color:var(--text);transition:background .1s}
.repo-item:hover{background:var(--bg)}
.repo-item.active{background:var(--alpaca-yellow-soft)}
.repo-item.disabled{cursor:not-allowed;color:var(--faint)}
.repo-item.disabled:hover{background:var(--bg)}
.repo-item .ri-check{width:12px;color:var(--alpaca-gold);font-weight:800;font-size:11px;flex-shrink:0}
.repo-item:not(.active) .ri-check{visibility:hidden}
.repo-item .ri-name{flex:1;font-weight:600}
.repo-item.disabled .ri-name{font-weight:500}
.repo-item .ri-soon{font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
  color:var(--faint);background:var(--bg);border:1px solid var(--border);
  border-radius:3px;padding:1px 5px}
.repo-menu-foot{border-top:1px solid var(--border);margin-top:4px;padding:8px 10px;
  font-size:10.5px;color:var(--faint);line-height:1.45}
.repo-menu-foot code{font-family:"SF Mono",ui-monospace,monospace;font-size:10px;
  background:var(--bg);padding:1px 4px;border-radius:3px;color:var(--dim)}
.repo-toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);z-index:10000;
  background:rgba(24,28,31,.94);color:rgba(255,255,255,.92);
  font-size:12px;padding:9px 14px;border-radius:8px;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  box-shadow:0 4px 12px rgba(0,0,0,.18);opacity:0;transition:opacity .16s;pointer-events:none}
.repo-toast.show{opacity:1}
.rail-nav{display:flex;gap:0;padding:8px 16px;border-bottom:1px solid var(--border);background:var(--bg)}
.rail-nav a{flex:1;text-align:center;font-size:11px;font-weight:600;color:var(--dim);
  padding:6px 8px;border-radius:5px;text-transform:uppercase;letter-spacing:.04em;transition:.1s}
.rail-nav a:hover{color:var(--text);background:var(--surface);text-decoration:none}
.rail-nav a.active{color:var(--text);background:var(--alpaca-yellow-soft);
  border:1px solid var(--alpaca-gold-bg);box-shadow:0 1px 0 rgba(184,132,26,.08)}

.mode-toggle{display:flex;gap:0;padding:10px 16px 0;}
.mode-toggle button{flex:1;height:26px;border:1px solid var(--border);background:var(--bg);
  font-size:11px;font-weight:600;color:var(--faint);cursor:pointer;transition:.12s;
  text-transform:uppercase;letter-spacing:.04em}
.mode-toggle button:first-child{border-radius:6px 0 0 6px;border-right:none}
.mode-toggle button:last-child{border-radius:0 6px 6px 0}
.mode-toggle button.on{background:var(--text);color:#fff;border-color:var(--text)}
.mode-toggle button:hover:not(.on){color:var(--text)}
.search{padding:10px 16px 14px;border-bottom:1px solid var(--border);position:relative}
.search.pr-mode .range-input,.search.pr-mode #sugg{display:none}
.search input{width:100%;height:34px;border:1px solid var(--border);border-radius:7px;
  padding:0 10px;background:var(--bg);font-size:13px;outline:none;transition:border-color .12s}
.search input:focus{border-color:var(--accent);background:var(--surface)}
.search input.path-input{padding-right:60px;font-family:"SF Mono","Fira Code",ui-monospace,monospace;font-size:12px}
.search-row{display:flex;gap:6px;margin-top:8px}
.search-row input.range-input{width:80px;text-align:center;font-family:"SF Mono",ui-monospace,monospace;font-size:12px}
.search-row button{flex:1;height:34px;border:none;border-radius:7px;
  background:linear-gradient(180deg,var(--alpaca-yellow) 0%,#F5C800 100%);color:var(--text);
  font-size:13px;font-weight:700;letter-spacing:.01em;cursor:pointer;transition:transform .08s,box-shadow .12s;
  box-shadow:0 1px 0 rgba(0,0,0,.04),0 1px 3px rgba(184,132,26,.25)}
.search-row button:hover{box-shadow:0 1px 0 rgba(0,0,0,.05),0 2px 6px rgba(184,132,26,.35);transform:translateY(-1px)}
.search-row button:active{transform:translateY(0)}
.search-row button:disabled{opacity:.55;cursor:wait;transform:none;box-shadow:none}

.sugg{position:absolute;top:54px;left:16px;right:16px;background:var(--surface);
  border:1px solid var(--border-strong);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.08);
  max-height:280px;overflow-y:auto;z-index:10;display:none}
.sugg.on{display:block}
.sugg-row{padding:7px 10px;font-family:"SF Mono",ui-monospace,monospace;font-size:11.5px;
  cursor:pointer;border-bottom:1px solid var(--border);color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sugg-row:last-child{border-bottom:none}
.sugg-row.on{background:var(--accent-bg);color:var(--accent)}
.sugg-row mark{background:#fde68a;color:#92400e;padding:0;font-weight:600}

.rail-section{padding:12px 16px;border-bottom:1px solid var(--border)}
.rail-section h4{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  color:var(--faint);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.rail-section h4 .clear{font-size:10px;color:var(--faint);cursor:pointer;text-transform:none;letter-spacing:0}
.rail-section h4 .clear:hover{color:var(--rose)}

.rail-list{display:flex;flex-direction:column;gap:2px}
.rail-item{padding:7px 8px;border-radius:6px;cursor:pointer;font-size:12px;
  transition:background .1s;display:flex;flex-direction:column;gap:2px}
.rail-item:hover{background:var(--bg)}
.rail-item .ri-path{font-family:"SF Mono",ui-monospace,monospace;font-size:11px;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;direction:rtl;text-align:left}
.rail-item .ri-meta{font-size:10.5px;color:var(--faint);display:flex;justify-content:space-between;gap:4px}
.rail-item .ri-team{color:var(--accent);font-weight:600}
.rail-item .ri-score{color:var(--green);font-weight:600}

.rail-empty{padding:8px;font-size:11.5px;color:var(--faint);font-style:italic}

.rail-foot{margin-top:auto;padding:10px 16px;font-size:10.5px;color:var(--faint);
  border-top:1px solid var(--border);display:flex;justify-content:space-between;gap:8px}

/* ===== Right pane ===== */
.pane{overflow-y:auto;background:var(--bg)}
.pane-inner{max-width:1100px;padding:24px 32px 80px}

.empty-state{display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:32px;margin:-24px -32px -80px}
.empty-state .em-card{max-width:640px;text-align:center}
.empty-state .em-eyebrow{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.18em;
  color:var(--alpaca-gold);margin-bottom:14px}
.empty-state h2{font-size:28px;font-weight:800;color:var(--text);margin-bottom:12px;
  letter-spacing:-.025em;line-height:1.15}
.empty-state .em-quote{font-size:14.5px;font-style:italic;color:var(--dim);line-height:1.55;
  margin-bottom:32px;font-weight:500}
.empty-state .em-quote::before{content:"\201C";color:var(--alpaca-gold);font-weight:700;margin-right:2px}
.empty-state .em-quote::after{content:"\201D";color:var(--alpaca-gold);font-weight:700;margin-left:2px}
.empty-state .em-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:26px}
.empty-state .em-action{background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:14px 14px 12px;text-align:left;cursor:pointer;transition:.14s;display:flex;flex-direction:column;
  gap:4px;font-family:inherit}
.empty-state .em-action:hover{border-color:var(--alpaca-gold);background:var(--alpaca-yellow-soft);
  transform:translateY(-1px);box-shadow:0 4px 12px rgba(184,132,26,.10)}
.empty-state .em-action-icon{font-size:16px;margin-bottom:2px}
.empty-state .em-action-title{font-size:12.5px;font-weight:700;color:var(--text);letter-spacing:-.005em}
.empty-state .em-action-sub{font-size:11px;color:var(--faint);line-height:1.45}
.empty-state .em-tries{font-size:11px;color:var(--faint);margin-bottom:10px;letter-spacing:.04em;text-transform:uppercase;font-weight:700}
.empty-state .em-chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.empty-state .em-chip{background:var(--bg);border:1px solid var(--border);border-radius:999px;
  padding:5px 11px;font-size:11.5px;color:var(--dim);font-family:"SF Mono",ui-monospace,monospace;
  cursor:pointer;transition:.12s}
.empty-state .em-chip:hover{border-color:var(--alpaca-gold);color:var(--text);background:var(--alpaca-yellow-soft)}
.empty-state .em-foot{margin-top:28px;font-size:11px;color:var(--faint);line-height:1.6}
.empty-state .em-foot .em-dot{color:var(--alpaca-gold);margin:0 6px}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--dim);font-size:13px}
.loading::before{content:"";width:14px;height:14px;border:2px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;margin-right:10px;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Header */
.head-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:20px 24px;margin-bottom:16px}
.head-row{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:14px}
.head-path{font-family:"SF Mono",ui-monospace,monospace;font-size:12.5px;color:var(--dim);
  background:var(--bg);padding:5px 10px;border-radius:6px;display:inline-block;
  word-break:break-all;line-height:1.4}
.head-actions{display:flex;gap:6px;flex-shrink:0}
.head-actions button{height:28px;padding:0 10px;background:var(--surface);border:1px solid var(--border);
  border-radius:6px;font-size:12px;color:var(--dim);cursor:pointer;transition:all .12s}
.head-actions button:hover{border-color:var(--accent);color:var(--accent)}

.team-line{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.team-eyebrow{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
  color:var(--faint);margin-right:2px}
.team-name{font-size:18px;font-weight:700;letter-spacing:-.01em;line-height:1.2;color:var(--text)}
.team-name a{color:inherit;text-decoration:none;border-bottom:1.5px solid var(--alpaca-yellow,#FFD400);transition:color .12s}
.team-name a:hover{color:var(--alpaca-gold,#C8941A)}
.team-lane{font-size:12px;color:var(--dim);font-family:"SF Mono",ui-monospace,monospace}
.team-link{font-size:11px;color:var(--dim);text-decoration:none;display:inline-flex;align-items:center;gap:3px;
  padding:3px 8px;border-radius:6px;border:1px solid var(--border);transition:.12s}
.team-link:hover{border-color:var(--alpaca-gold,#C8941A);color:var(--text);text-decoration:none}

/* PR review status card */
.review-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:14px 18px;margin-bottom:16px}
.review-card-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}
.review-card-head h3{margin:0;font-size:13px;font-weight:700;letter-spacing:.01em;color:var(--text)}
.review-tally{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.review-next{font-size:12.5px;color:var(--text);background:var(--bg);border:1px solid var(--border);
  border-left:3px solid var(--alpaca-yellow,#FFD400);border-radius:6px;padding:8px 12px;margin-bottom:10px;line-height:1.5}
.review-next strong{color:var(--text)}
.review-list{display:flex;flex-direction:column;gap:6px}
.review-row{display:flex;align-items:center;gap:10px;padding:6px 10px;background:var(--bg);
  border-radius:6px;font-size:12.5px}
.review-row .rv-state{flex-shrink:0;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:10px;letter-spacing:.02em}
.review-row .rv-state.approved{background:var(--green-bg);color:var(--green)}
.review-row .rv-state.changes{background:var(--rose-bg);color:var(--rose)}
.review-row .rv-state.commented{background:var(--bg);color:var(--dim);border:1px solid var(--border)}
.review-row .rv-state.dismissed{background:var(--bg);color:var(--faint);border:1px solid var(--border);text-decoration:line-through}
.review-row .rv-author{flex:1;color:var(--text);font-weight:500}
.review-row .rv-author a{color:inherit;text-decoration:none}
.review-row .rv-author a:hover{color:var(--accent)}
.review-row .rv-when{color:var(--faint);font-size:11px}
.pr-body{font-size:12.5px;line-height:1.55;color:var(--dim);white-space:pre-wrap;
  background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px;
  max-height:140px;overflow:hidden;position:relative;font-family:inherit}
.pr-body.expanded{max-height:none}
.pr-body-toggle{display:inline-block;margin-top:6px;background:transparent;border:none;color:var(--accent);
  font-size:11.5px;font-weight:600;cursor:pointer;padding:0}
.pr-body-toggle:hover{text-decoration:underline}

/* Code snippet preview (the actual lines being investigated) */
.code-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;
  margin-bottom:16px;overflow:hidden}
.code-card-head{display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:8px 14px;background:var(--bg);border-bottom:1px solid var(--border);
  font-size:11px;color:var(--dim);font-weight:600;letter-spacing:.02em}
.code-card-head .code-meta{display:flex;align-items:center;gap:8px}
.code-card-head .code-toggle{background:transparent;border:1px solid var(--border);color:var(--dim);
  font-size:11px;padding:2px 8px;border-radius:5px;cursor:pointer;transition:.12s}
.code-card-head .code-toggle:hover{border-color:var(--accent);color:var(--accent)}
.code-block{margin:0;padding:10px 0;font-family:"SF Mono",ui-monospace,monospace;font-size:12px;
  line-height:1.55;overflow-x:auto;max-height:420px;overflow-y:auto;background:var(--surface)}
.code-block .ln{display:flex;align-items:flex-start;padding:0 14px}
.code-block .ln.hl{background:rgba(255,212,0,.10);border-left:2px solid var(--alpaca-yellow,#FFD400);padding-left:12px}
.code-block .ln-no{color:var(--faint);min-width:38px;text-align:right;padding-right:14px;
  user-select:none;font-variant-numeric:tabular-nums}
.code-block .ln-tx{flex:1;white-space:pre;color:var(--text)}
.code-block .ln.hl .ln-no{color:var(--alpaca-gold,#C8941A);font-weight:700}
.code-card .code-empty{padding:18px 14px;color:var(--faint);font-size:12px;text-align:center}

.pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{font-size:11px;font-weight:600;padding:3px 9px;border-radius:14px;display:inline-flex;align-items:center;gap:4px}
.pill.indigo{background:var(--accent-bg);color:var(--accent)}
.pill.green{background:var(--green-bg);color:var(--green)}
.pill.amber{background:var(--amber-bg);color:var(--amber)}
.pill.rose{background:var(--rose-bg);color:var(--rose)}
.pill.gray{background:var(--bg);color:var(--dim);border:1px solid var(--border)}

/* Tabs */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:16px;background:var(--surface);
  border:1px solid var(--border);border-radius:10px;padding:4px}
.tab{flex:1;padding:8px 12px;font-size:12.5px;font-weight:600;color:var(--dim);
  background:transparent;border:none;border-radius:7px;cursor:pointer;transition:all .12s}
.tab:hover{color:var(--text)}
.tab.on{background:var(--text);color:#fff}

.tab-body{display:none}
.tab-body.on{display:block;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@keyframes flashIn{from{opacity:0}to{opacity:1}}
.flash-in{animation:flashIn .18s ease}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:18px 20px;margin-bottom:12px}
.card h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  color:var(--faint);margin-bottom:12px}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* Narrative */
.narrative{font-size:14px;line-height:1.7;color:var(--text)}

/* Work items */
.work-item{display:grid;grid-template-columns:auto 1fr auto;gap:0 12px;align-items:center;
  padding:11px 12px;background:var(--bg);border-radius:8px;margin-top:8px;cursor:pointer;
  transition:background .1s}
.work-item:hover{background:#eff1f5}
.work-item.clickable{cursor:pointer}
.w-badge{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;
  padding:3px 7px;border-radius:5px;white-space:nowrap}
.w-badge.open{background:var(--accent-bg);color:var(--accent)}
.w-badge.merged{background:var(--green-bg);color:var(--green)}
.w-badge.jira{background:#fef3c7;color:var(--amber)}
.w-body{min-width:0}
.w-title{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.w-sub{font-size:11px;color:var(--faint)}
.w-arrow{font-size:13px;color:var(--faint)}

/* Contributors */
.contrib-card{padding:14px;background:var(--bg);border-radius:9px;margin-bottom:8px}
.contrib-head{display:flex;align-items:center;gap:12px}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:12px;font-weight:700;flex-shrink:0}
.contrib-meta{flex:1;min-width:0}
.contrib-name{font-size:13px;font-weight:700}
.contrib-role{font-size:11px;color:var(--dim)}
.contrib-stats{font-size:11px;color:var(--faint);font-family:"SF Mono",ui-monospace,monospace}
.contrib-toggle{font-size:11px;color:var(--accent);cursor:pointer;font-weight:600}
.contrib-toggle:hover{text-decoration:underline}
.contrib-score{font-size:11px;color:var(--faint);font-family:"SF Mono",ui-monospace,monospace;
  margin-left:6px;padding:1px 6px;border-radius:4px;background:var(--code-bg);cursor:help}
.contrib-card.departed{opacity:0.55}
.contrib-card.departed .contrib-name::after{content:" (departed)";color:var(--faint);font-weight:400;font-size:10.5px}

.snippets{margin-top:10px;background:var(--code-bg);border-radius:7px;padding:10px;display:none}
.snippets.on{display:block}
.snippet-row{display:grid;grid-template-columns:36px 56px 1fr;gap:10px;font-family:"SF Mono",ui-monospace,monospace;
  font-size:11px;color:var(--code-fg);padding:1px 0;line-height:1.6}
.sn-num{color:#64748b;text-align:right}
.sn-sha{color:#a5b4fc}
.sn-code{white-space:pre;overflow:hidden;text-overflow:ellipsis}

/* Timeline */
.tl{position:relative;padding-left:18px;margin-top:6px}
.tl::before{content:"";position:absolute;left:6px;top:6px;bottom:6px;width:2px;background:var(--border)}
.tl-row{position:relative;padding:6px 0 14px 14px;cursor:pointer}
.tl-row::before{content:"";position:absolute;left:-15px;top:11px;width:9px;height:9px;border-radius:50%;
  background:var(--surface);border:2px solid var(--accent);box-shadow:0 0 0 3px var(--surface)}
.tl-row:hover .tl-title{color:var(--accent)}
.tl-date{font-size:10.5px;font-weight:600;color:var(--faint);font-family:"SF Mono",ui-monospace,monospace}
.tl-title{font-size:13px;font-weight:600;margin:2px 0;line-height:1.4}
.tl-title a{color:inherit;text-decoration:none}
.tl-title a:hover{color:var(--accent);text-decoration:underline}
.tl-meta{font-size:11px;color:var(--dim)}
.tl-note{font-size:12px;color:var(--text);margin-top:4px;line-height:1.45;
  padding-left:8px;border-left:2px solid var(--accent-bg)}
.tl-note.pending{color:var(--faint);font-style:italic;border-left-color:var(--border)}
.tl-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.tl-chip{display:inline-flex;align-items:center;font-size:10.5px;font-weight:600;
  padding:1px 7px;border-radius:9px;background:#fef3c7;color:var(--amber);
  text-decoration:none;letter-spacing:.02em;border:1px solid transparent}
.tl-chip.pr{background:var(--green-bg);color:var(--green)}
.tl-chip.commit{background:var(--bg);color:var(--dim);border-color:var(--border)}
.tl-chip:hover{filter:brightness(.95);text-decoration:none}
.activity-summary{font-size:13px;color:var(--text);line-height:1.5;margin:0 0 4px 0;
  padding:10px 12px;background:var(--accent-bg);border-radius:6px;border-left:3px solid var(--accent)}
.activity-summary.pending{color:var(--faint);font-style:italic;background:var(--bg);
  border-left-color:var(--border)}

/* Sources / why */
.kv{display:grid;grid-template-columns:140px 1fr;gap:6px 12px;font-size:12.5px}
.kv dt{color:var(--faint);font-weight:600}
.kv dd{color:var(--text)}
.bullets{list-style:none;display:flex;flex-direction:column;gap:6px}
.bullets li{padding-left:14px;position:relative;font-size:13px;line-height:1.6;color:var(--dim)}
.bullets li::before{content:"\2022";position:absolute;left:0;color:var(--accent)}

.next-box{background:var(--accent-bg);border-radius:8px;padding:14px 16px;margin-top:10px}
.next-title{font-size:13px;font-weight:700;margin-bottom:3px}
.next-copy{font-size:12.5px;color:var(--dim);line-height:1.55}
.next-link{display:inline-block;margin-top:6px;font-size:12.5px;font-weight:600;color:var(--accent)}

/* Routing strip + block */
.routing-strip{display:flex;flex-wrap:wrap;gap:6px 12px;margin-top:10px;font-size:12px;color:var(--dim)}
.routing-strip .rt{display:inline-flex;align-items:center;gap:5px;background:var(--bg);
  padding:4px 10px;border-radius:14px;border:1px solid var(--border);transition:all .12s}
.routing-strip .rt.clickable{cursor:pointer}
.routing-strip .rt.clickable:hover{border-color:var(--accent);color:var(--accent)}
.routing-strip .rt-key{font-weight:600;font-size:10.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.04em}
.routing-strip .rt-val{font-family:"SF Mono",ui-monospace,monospace;font-size:11.5px;color:var(--text)}
.routing-strip .rt.clickable:hover .rt-val{color:var(--accent)}
.routing-strip .rt-empty{color:var(--faint);font-style:italic;font-size:11px;padding:4px 0}

.routing-block{display:grid;grid-template-columns:120px 1fr;gap:8px 14px;font-size:12.5px;align-items:baseline}
.routing-block dt{color:var(--faint);font-weight:600;font-size:11.5px}
.routing-block dd a{color:var(--accent)}
.routing-block .rb-chip{display:inline-block;background:var(--bg);padding:2px 8px;border-radius:5px;
  font-family:"SF Mono",ui-monospace,monospace;font-size:11.5px;margin-right:4px;cursor:pointer}
.routing-block .rb-chip:hover{background:var(--accent-bg);color:var(--accent)}
.routing-block .rb-empty{color:var(--faint);font-style:italic}

/* Contributor status badges + dots */
.contrib-card.departed{opacity:.55}
.contrib-card.departed .contrib-name{text-decoration:line-through;text-decoration-color:var(--faint)}
.contrib-badge{display:inline-block;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;
  padding:2px 6px;border-radius:4px;margin-left:6px;vertical-align:middle}
.contrib-badge.left{background:#fee2e2;color:#991b1b}
.contrib-badge.team{background:var(--green-bg);color:var(--green)}
.gh-handle{font-size:11.5px;font-weight:500;color:var(--dim);text-decoration:none;margin-left:6px;
  font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
.gh-handle:hover{color:var(--ink);text-decoration:underline}
.av-wrap{position:relative;flex-shrink:0}
.av-dot{position:absolute;bottom:-1px;right:-1px;width:11px;height:11px;border-radius:50%;
  background:var(--green);border:2px solid var(--surface)}
.av-dot.bg{background:var(--bg)}

.sources-mono{font-family:"SF Mono",ui-monospace,monospace;font-size:11px;color:var(--faint);
  padding:8px 10px;background:var(--bg);border-radius:6px;margin-top:8px}

.error-card{background:#fff1f2;border:1px solid #fecdd3;color:#9f1239;padding:14px 18px;border-radius:10px}
.error-card strong{display:block;margin-bottom:4px}

/* ===== Perceived-speed: top progress bar, stale dim, skeletons ===== */
.pane{position:relative}
.top-progress{position:absolute;top:0;left:0;right:0;height:2px;background:transparent;
  z-index:50;overflow:hidden;display:none;pointer-events:none}
.top-progress.on{display:block}
.top-progress::after{content:"";position:absolute;top:0;height:100%;width:35%;
  background:var(--accent);animation:slide 1.1s ease-in-out infinite}
@keyframes slide{0%{left:-35%}100%{left:100%}}

.pane-inner.is-stale{opacity:.45;pointer-events:none;transition:opacity .12s}

.sk{background:linear-gradient(90deg,var(--bg) 0%,#eef0f3 50%,var(--bg) 100%);
  background-size:200% 100%;animation:shimmer 1.4s ease-in-out infinite;border-radius:6px;display:block}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk-line{height:12px;margin:8px 0}
.sk-line.lg{height:24px;width:55%;margin-bottom:14px}
.sk-line.md{width:80%}
.sk-line.sm{width:30%}
.sk-pill{display:inline-block;width:80px;height:20px;border-radius:14px;margin:0 6px 6px 0;vertical-align:middle}
.sk-card{padding:18px 20px;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:12px}
.sk-row{display:flex;gap:12px;align-items:center;margin-bottom:10px}
.sk-circ{width:36px;height:36px;border-radius:50%;flex-shrink:0}

/* Inline mini-spinner + placeholder copy for stage-gated sections */
.mini-spin{display:inline-block;width:11px;height:11px;border:2px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;
  vertical-align:-1px;margin-right:6px}
.placeholder-row{font-size:12.5px;color:var(--faint);font-style:italic;padding:8px 2px}
.placeholder-row .mini-spin{margin-right:8px}
.elapsed-timer{font-family:"SF Mono",ui-monospace,monospace;font-size:11px;color:var(--faint);
  font-style:normal;margin-left:6px;opacity:.7}
.pill.loading-pill{background:var(--bg);color:var(--faint);border:1px dashed var(--border-strong)}

/* Stable layout: pre-allocate space so cards don't jump when stages arrive */
.pills{min-height:24px;align-items:center}
.head-card{min-height:140px}
.card .narrative{min-height:48px}
.tab-body[data-tab="overview"] .grid-2 > .card{min-height:128px}
.tab-body[data-tab="overview"] > .card:last-child{min-height:80px}
.tab-body[data-tab="contributors"] .card{min-height:240px}
.tab-body[data-tab="activity"] .card{min-height:160px}

/* AI summary badge */
.ai-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;
  padding:2px 7px;border-radius:10px;background:var(--accent-bg);color:var(--accent);

  padding:8px 16px;border-radius:7px;font-size:12px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:100}
.toast.on{opacity:1}
</style>

<script>
// Landing state: no auto-investigation. The empty-state card has quick-try chips
// that call goto() for users who want a demo path. Deep-linked URLs still auto-run.
function focusPathInput() {
  const el = document.getElementById("path-input");
  if (el) { el.focus(); el.select && el.select(); }
}

const state = {
  paths: [],          // all gobroker paths for autocomplete
  recent: JSON.parse(localStorage.getItem("codemap.recent") || "[]"),
  cache: {},          // in-memory mirror of IDB; key=path|range, val=case dict
  current: null,      // current investigation result
  busy: false,
  suggIdx: -1,
  prefetchTimer: null,
  prefetchInflight: new Set(),
  modelName: "",      // populated from /health on init
};

// ---- result cache: in-memory mirror backed by IndexedDB (24h TTL, ~50MB quota) ----
// Bump CACHE_SCHEMA whenever the investigation response shape changes; cached
// entries from older schemas get evicted on next page load.
const CACHE_MAX = 50;
const CACHE_TTL_MS = 24 * 60 * 60 * 1000;
const CACHE_SCHEMA = 4;  // v4: added github + github_url to contributors
const IDB_NAME = "codetective", IDB_VER = 1, IDB_STORE = "cases";

function _idbOpen() {
  return new Promise((res, rej) => {
    if (!window.indexedDB) return rej(new Error("no indexeddb"));
    const req = indexedDB.open(IDB_NAME, IDB_VER);
    req.onupgradeneeded = () => {
      if (!req.result.objectStoreNames.contains(IDB_STORE)) req.result.createObjectStore(IDB_STORE);
    };
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}
async function _idbAll() {
  const db = await _idbOpen();
  return new Promise(res => {
    const out = [];
    const req = db.transaction(IDB_STORE, "readonly").objectStore(IDB_STORE).openCursor();
    req.onsuccess = e => { const c = e.target.result; if (c) { out.push([c.key, c.value]); c.continue(); } else res(out); };
    req.onerror = () => res(out);
  });
}
async function _idbPut(key, val) {
  const db = await _idbOpen();
  return new Promise(res => {
    const tx = db.transaction(IDB_STORE, "readwrite");
    tx.objectStore(IDB_STORE).put(val, key);
    tx.oncomplete = () => res();
    tx.onerror = () => res();
  });
}
async function _idbDel(key) {
  const db = await _idbOpen();
  return new Promise(res => {
    const tx = db.transaction(IDB_STORE, "readwrite");
    tx.objectStore(IDB_STORE).delete(key);
    tx.oncomplete = () => res();
    tx.onerror = () => res();
  });
}

async function loadCacheFromIdb() {
  try {
    const all = await _idbAll();
    let evicted = 0;
    for (const [k, v] of all) {
      const fresh = v && v._cachedAt && Date.now() - v._cachedAt < CACHE_TTL_MS;
      const sameSchema = v && v._schema === CACHE_SCHEMA;
      if (fresh && sameSchema) {
        state.cache[k] = v;
      } else {
        _idbDel(k);
        evicted++;
      }
    }
    // One-time migration from old localStorage cache.
    const legacy = localStorage.getItem("codemap.cache");
    if (legacy) {
      try {
        const obj = JSON.parse(legacy);
        for (const k of Object.keys(obj)) {
          if (!state.cache[k]) {
            const v = obj[k];
            v._cachedAt = v._cachedAt || Date.now();
            state.cache[k] = v;
            _idbPut(k, v);
          }
        }
      } catch {}
      localStorage.removeItem("codemap.cache");
    }
    if (evicted) console.log(`[cache] evicted ${evicted} stale entries`);
  } catch (e) {
    console.warn("[cache] idb unavailable, in-memory only", e?.message);
  }
}

function cacheKey(path, range) { return `${path}|${range||""}`; }
function cacheGet(path, range) {
  const v = state.cache[cacheKey(path, range)];
  if (!v) return null;
  if (v._cachedAt && Date.now() - v._cachedAt > CACHE_TTL_MS) {
    delete state.cache[cacheKey(path, range)];
    _idbDel(cacheKey(path, range));
    return null;
  }
  return v;
}
function cachePut(path, range, c) {
  c._stages = c._stages || {shell: true, contributors: true, github: true, narrative: true};
  c._cachedAt = Date.now();
  c._schema = CACHE_SCHEMA;
  const k = cacheKey(path, range);
  state.cache[k] = c;
  const keys = Object.keys(state.cache);
  if (keys.length > CACHE_MAX) {
    const drop = keys[0];
    delete state.cache[drop];
    _idbDel(drop);
  }
  _idbPut(k, c);
}

// ---- skeleton placeholder ----
function renderSkeleton() {
  return `
    <div class="sk-card">
      <div class="sk sk-line sm"></div>
      <div class="sk sk-line lg"></div>
      <div><span class="sk sk-pill"></span><span class="sk sk-pill"></span><span class="sk sk-pill"></span><span class="sk sk-pill"></span></div>
    </div>
    <div class="sk-card">
      <div class="sk sk-line sm" style="margin-bottom:14px"></div>
      <div class="sk-row"><div class="sk sk-circ"></div><div style="flex:1"><div class="sk sk-line md"></div><div class="sk sk-line sm"></div></div></div>
      <div class="sk-row"><div class="sk sk-circ"></div><div style="flex:1"><div class="sk sk-line md"></div><div class="sk sk-line sm"></div></div></div>
      <div class="sk-row"><div class="sk sk-circ"></div><div style="flex:1"><div class="sk sk-line md"></div><div class="sk sk-line sm"></div></div></div>
    </div>
    <div class="sk-card">
      <div class="sk sk-line sm" style="margin-bottom:12px"></div>
      <div class="sk sk-line md"></div><div class="sk sk-line md"></div><div class="sk sk-line sm"></div>
    </div>`;
}

// ---- hover-prefetch: warm /investigate so Enter feels instant ----
function schedulePrefetch(path, range) {
  clearTimeout(state.prefetchTimer);
  state.prefetchTimer = setTimeout(() => prefetch(path, range || ""), 220);
}
function prefetch(path, range) {
  if (!path || state.busy) return;
  if (cacheGet(path, range)) return;
  const k = cacheKey(path, range);
  if (state.prefetchInflight.has(k)) return;
  state.prefetchInflight.add(k);
  fetch("/investigate", {
    method: "POST", headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ path, range }),
  }).then(r => r.ok ? r.json() : null)
    .then(c => { if (c) cachePut(path, range, c); })
    .catch(() => {})
    .finally(() => state.prefetchInflight.delete(k));
}

// ---- autocomplete ----
function fuzzyMatch(query, paths, limit=8) {
  if (!query) return [];
  const q = query.toLowerCase();
  const tokens = q.split(/[\s/]+/).filter(Boolean);
  const scored = [];
  for (const p of paths) {
    const lp = p.toLowerCase();
    let score = 0;
    for (const t of tokens) {
      const idx = lp.lastIndexOf(t);
      if (idx === -1) { score = -1; break; }
      score += 100 - idx * 0.1;
      // bonus if matches a path segment boundary
      if (idx === 0 || lp[idx-1] === "/" || lp[idx-1] === "_" || lp[idx-1] === ".") score += 50;
    }
    if (score > 0) {
      // bonus for shorter paths
      score -= p.length * 0.05;
      scored.push([score, p]);
    }
  }
  scored.sort((a,b) => b[0]-a[0]);
  return scored.slice(0, limit).map(x => x[1]);
}

function highlight(path, query) {
  const tokens = query.toLowerCase().split(/[\s/]+/).filter(Boolean);
  let html = esc(path);
  for (const t of tokens) {
    const re = new RegExp(`(${t.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")})`, "gi");
    html = html.replace(re, "<mark>$1</mark>");
  }
  return html;
}

function renderSugg() {
  const q = $("path-input").value.trim();
  const matches = fuzzyMatch(q, state.paths);
  const box = $("sugg");
  if (!q || !matches.length || (matches.length === 1 && matches[0] === q)) {
    box.classList.remove("on"); state.suggIdx = -1; return;
  }
  box.innerHTML = matches.map((p,i) =>
    `<div class="sugg-row${i===state.suggIdx?" on":""}" data-i="${i}" data-p="${esc(p)}">${highlight(p,q)}</div>`
  ).join("");
  box.classList.add("on");
  box.querySelectorAll(".sugg-row").forEach(el => {
    el.onclick = () => { $("path-input").value = el.dataset.p; box.classList.remove("on"); investigate(); };
    el.onmouseenter = () => schedulePrefetch(el.dataset.p, $("range-input").value.trim());
  });
}

$("path-input").addEventListener("input", renderSugg);
$("path-input").addEventListener("focus", renderSugg);
$("path-input").addEventListener("blur", () => setTimeout(()=>$("sugg").classList.remove("on"), 150));
$("path-input").addEventListener("keydown", e => {
  const box = $("sugg");
  const rows = box.querySelectorAll(".sugg-row");
  if (e.key === "ArrowDown" && rows.length) {
    e.preventDefault(); state.suggIdx = (state.suggIdx+1)%rows.length; renderSugg();
    const r2 = $("sugg").querySelectorAll(".sugg-row")[state.suggIdx];
    if (r2) schedulePrefetch(r2.dataset.p, $("range-input").value.trim());
  }
  else if (e.key === "ArrowUp" && rows.length) {
    e.preventDefault(); state.suggIdx = (state.suggIdx-1+rows.length)%rows.length; renderSugg();
    const r2 = $("sugg").querySelectorAll(".sugg-row")[state.suggIdx];
    if (r2) schedulePrefetch(r2.dataset.p, $("range-input").value.trim());
  }
  else if (e.key === "Enter") {
    if (state.suggIdx >= 0 && rows[state.suggIdx]) { $("path-input").value = rows[state.suggIdx].dataset.p; box.classList.remove("on"); }
    investigate();
  } else if (e.key === "Escape") { box.classList.remove("on"); }
});

// ---- investigate (SSE-streamed) ----
function mergePartial(target, partial) {
  for (const k of Object.keys(partial)) {
    if (k === "stage") continue;
    const v = partial[k];
    if (v && typeof v === "object" && !Array.isArray(v) && target[k] && typeof target[k] === "object" && !Array.isArray(target[k])) {
      Object.assign(target[k], v);
    } else {
      target[k] = v;
    }
  }
}

function streamInvestigate(path, range, fp, onPartial) {
  return new Promise((resolve, reject) => {
    const u = new URL("/investigate/stream", location.origin);
    u.searchParams.set("path", path);
    if (range) u.searchParams.set("range", range);
    if (fp) u.searchParams.set("fp", fp);
    const es = new EventSource(u);
    let gotAny = false;
    let errored = false;
    es.onmessage = e => {
      try { onPartial(JSON.parse(e.data)); gotAny = true; } catch {}
    };
    es.addEventListener("error", e => {
      // event:error events have a data payload; raw stream errors don't.
      if (e.data) {
        errored = true;
        try { reject(JSON.parse(e.data)); } catch { reject({detail: "stream error"}); }
        es.close();
      } else if (es.readyState === EventSource.CLOSED) {
        if (gotAny) resolve(); else reject({detail: "connection closed before data"});
      } else {
        es.close();
        if (gotAny) resolve(); else reject({detail: "connection error"});
      }
    });
    es.addEventListener("done", () => { es.close(); if (!errored) resolve(); });
  });
}

// Mode toggle: "path" investigates a file, "pr" investigates a PR (number/url/jira).
state.mode = state.mode || "path";
function setMode(m) {
  state.mode = m;
  $("mode-path").classList.toggle("on", m === "path");
  $("mode-pr").classList.toggle("on", m === "pr");
  const sb = $("search-box");
  sb.classList.toggle("pr-mode", m === "pr");
  const inp = $("path-input");
  inp.placeholder = m === "pr" ? "PR # / URL / Jira key (e.g. LPCD-1560)" : "Type a path…";
  inp.value = "";
  $("range-input").value = "";
  $("sugg").style.display = "none";
}

async function investigate({ skipPush=false } = {}) {
  if (state.busy) return;
  if (state.mode === "pr") return investigatePR({ skipPush });
  const path = $("path-input").value.trim();
  const range = $("range-input").value.trim();
  if (!path) { toast("Enter a path"); return; }

  state.busy = true;
  $("go").disabled = true;
  $("top-progress").classList.add("on");
  startElapsedTicker();

  // Stage A: render *something* immediately.
  // Priority: cached result for this path > shell-only render with loading rows.
  // We deliberately don't dim the previous pane or wipe to a skeleton — both
  // were "the whole right side is reloading." Per-card loading rows + the top
  // progress bar are enough to communicate "fresh data is on the way."
  const cached = cacheGet(path, range);
  let working;
  if (cached) {
    working = JSON.parse(JSON.stringify(cached));
    state.current = working;
    render(withDefaults(working));
  } else {
    working = { path, range, _stages: {} };
    state.current = working;
    state._renderKey = null;
    render(withDefaults(working));
  }

  // Stage B: stream the live result, re-rendering after each event.
  // If we had a cached display we KEEP it visible and overlay fresh data on top
  // (smoother than wiping to skeletons), otherwise initialize fresh. If the
  // server confirms our cached fingerprint via stage:"unchanged", we skip
  // re-rendering entirely and just bump the cache timestamp.
  const cachedFp = cached?.fingerprint || null;
  let firstStreamEvent = true;
  let unchanged = false;
  try {
    await streamInvestigate(path, range, cachedFp, partial => {
      if (partial.stage === "unchanged") {
        unchanged = true;
        return;  // keep cached display as-is, finally{} will refresh timestamp
      }
      if (firstStreamEvent) {
        firstStreamEvent = false;
        if (!cached) {
          working = {};
          working._stages = {};
          state.current = working;
        }
      }
      mergePartial(working, partial);
      working._stages = working._stages || {};
      working._stages[partial.stage] = true;
      render(withDefaults(working), partial.stage);
    });
    cachePut(path, range, working);  // also refreshes _cachedAt for fp short-circuit
    pushRecent(path, range, working.summary?.title);
    if (!skipPush) {
      const u = new URL(location.href);
      u.searchParams.set("path", path);
      if (range) u.searchParams.set("range", range); else u.searchParams.delete("range");
      history.pushState({ path, range }, "", u);
    }
  } catch (err) {
    // Stream failed. Fall back to the non-streaming endpoint so the user still gets a result.
    try {
      const r = await fetch("/investigate", {
        method: "POST", headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ path, range }),
      });
      if (!r.ok) {
        const e2 = await r.json().catch(()=>({detail:r.statusText}));
        renderError(e2.detail || err.detail || "Failed", path);
      } else {
        const c = await r.json();
        c._stages = {shell: true, contributors: true, github: true, narrative: true};
        state.current = c;
        render(withDefaults(c));
        cachePut(path, range, c);
        pushRecent(path, range, c.summary?.title);
      }
    } catch (e2) {
      renderError(err.detail || String(e2), path);
    }
  } finally {
    state.busy = false;
    $("go").disabled = false;
    $("top-progress").classList.remove("on");
    stopElapsedTicker();
  }
}

// ---------- PR mode ----------
async function investigatePR({ skipPush = false } = {}) {
  const ident = $("path-input").value.trim();
  if (!ident) { toast("Enter a PR number, URL, or Jira key"); return; }
  state.busy = true;
  $("go").disabled = true;
  $("top-progress").classList.add("on");
  startElapsedTicker();
  $("pane-body").innerHTML = `<div class="card"><h3>Analyzing PR ${esc(ident)}…</h3>${loadingRow("Fetching PR + scoring reviewers across changed files…")}</div>`;
  try {
    const r = await fetch(`/pr/${encodeURIComponent(ident)}`);
    if (!r.ok) {
      const e = await r.json().catch(() => ({ detail: r.statusText }));
      renderError(e.detail || "PR lookup failed", ident);
      return;
    }
    const c = await r.json();
    state.currentPR = c;
    state._renderKey = null;  // force shell re-render on next path mode use
    renderPR(c);
    if (!skipPush) {
      const u = new URL(location.href);
      u.searchParams.set("pr", String(c.pr.number));
      u.searchParams.delete("path");
      u.searchParams.delete("range");
      history.pushState({ pr: c.pr.number }, "", u);
    }
  } catch (err) {
    renderError(String(err), ident);
  } finally {
    state.busy = false;
    $("go").disabled = false;
    $("top-progress").classList.remove("on");
    stopElapsedTicker();
  }
}

  if (!iso) return "";
  const d = new Date(iso);
  const days = (Date.now() - d.getTime()) / 86400000;

  if (days < 30) return Math.round(days) + "d ago";
  return Math.round(days / 30) + "mo ago";
}

// PR review status: tally + per-reviewer verdicts + suggested next action.
function _reviewStateMeta(state) {
  const s = (state || "").toUpperCase();
  if (s === "APPROVED")          return { cls: "approved",  label: "approved" };
  if (s === "CHANGES_REQUESTED") return { cls: "changes",   label: "changes requested" };
  if (s === "DISMISSED")         return { cls: "dismissed", label: "dismissed" };
  return                                { cls: "commented", label: s ? s.toLowerCase() : "commented" };
}

function reviewRowHtml(rv) {
  const meta = _reviewStateMeta(rv.state);
  const ago  = _agoShort(rv.submitted_at);
  return `<div class="review-row">
    <span class="rv-state ${meta.cls}">${meta.label}</span>
    <span class="rv-author"><a href="https://github.com/${esc(rv.author)}" target="_blank">@${esc(rv.author)}</a></span>
    <span class="rv-when">${esc(ago)}</span>
  </div>`;
}

function _suggestedAction(c) {
  const pr = c.pr;
  const summary = pr.review_summary || [];
  const approvals = summary.filter(r => r.state === "APPROVED").length;
  const changes   = summary.filter(r => r.state === "CHANGES_REQUESTED").map(r => r.author);
  const pendingAssigned = (pr.review_requests || []);
  const topRev = (c.reviewers.recommended || [])[0];

  if (pr.state === "MERGED") return `Already merged.`;
  if (pr.is_draft)           return `PR is in draft. No action until the author marks it ready.`;
  if (changes.length)        return `<strong>Wait for</strong> @${esc(changes[0])} to re-review — they requested changes.`;
  if (pendingAssigned.length && approvals === 0)
    return `<strong>Pending</strong> review from ${pendingAssigned.map(l => '@' + esc(l)).join(", ")}.`;
  if (approvals === 0 && topRev)
    return `No reviews yet. <strong>Best ping:</strong> ${esc(topRev.name)}${topRev.github_login ? ` (@${esc(topRev.github_login)})` : ""} — top expert on the changed code.`;
  if (approvals >= 1 && pr.state === "OPEN")
    return `<strong>${approvals} approval${approvals===1?'':'s'}</strong>${pendingAssigned.length ? `, still waiting on ${pendingAssigned.map(l => '@' + esc(l)).join(", ")}` : "."}`;
  return "No reviews submitted yet.";
}

function reviewStatusCardHtml(c) {
  const pr = c.pr;
  const summary = pr.review_summary || [];
  const requested = pr.review_requests || [];
  const approvals = summary.filter(r => r.state === "APPROVED").length;
  const changes   = summary.filter(r => r.state === "CHANGES_REQUESTED").length;
  const comments  = summary.filter(r => r.state === "COMMENTED").length;

  const tallyPills = [
    approvals ? `<span class="pill green">${approvals} approved</span>` : "",
    changes   ? `<span class="pill rose">${changes} changes requested</span>` : "",
    comments  ? `<span class="pill gray">${comments} commented</span>` : "",
    requested.length ? `<span class="pill amber">${requested.length} pending</span>` : "",
  ].filter(Boolean).join("");

  const reviewRows = summary.length
    ? summary.map(reviewRowHtml).join("")
    : `<div class="review-row" style="color:var(--faint)">No reviews submitted yet.</div>`;

  return `
    <div class="review-card">
      <div class="review-card-head">
        <h3>Review status</h3>
        <div class="review-tally">${tallyPills || `<span class="pill gray">no reviews</span>`}</div>
      </div>
      <div class="review-next">${_suggestedAction(c)}</div>
      <div class="review-list">${reviewRows}</div>
    </div>`;
}

  const recommended = c.reviewers.recommended;
  const departedRev = c.reviewers.departed_with_history;

  $("pane-body").innerHTML = `
    <div class="head-card">
      <div class="head-row">
        <div>
          <div class="head-path">PR #${esc(pr.number)} · ${esc(pr.title)}</div>
        </div>
        <div class="head-actions">
          <button onclick="window.open('${esc(pr.url)}', '_blank')">Open in GitHub</button>
        </div>
      </div>
      <div class="team-line">
        <div class="team-name">by ${esc(pr.author)}</div>
        <div class="team-lane">${esc(pr.head_branch)} → ${esc(pr.base_branch)}</div>
        ${stateBadge}
        ${_riskBadge(c.risk.level)}
      </div>
      <div class="pills">
        <span class="pill gray">${c.files_count} files</span>
        <span class="pill green">+${pr.additions}</span>
        <span class="pill rose">-${pr.deletions}</span>
        <span class="pill gray">updated ${esc(_agoShort(pr.updated_at))}</span>
        ${c.teams.length > 1 ? `<span class="pill amber">${c.teams.length} teams</span>` : ""}
        ${c.conflicts.length ? `<span class="pill amber">${c.conflicts.length} conflict${c.conflicts.length===1?'':'s'}</span>` : ""}
        ${c.missing_files_count ? `<span class="pill gray">${c.missing_files_count} missing</span>` : ""}
      </div>
    </div>

    ${reviewStatusCardHtml(c)}

    <div class="tabs">
      <button class="tab on" data-tab="reviewers" onclick="setPRTab('reviewers')">Reviewers (${recommended.length})</button>
      <button class="tab" data-tab="files" onclick="setPRTab('files')">Files (${c.files_count})</button>
      <button class="tab" data-tab="teams" onclick="setPRTab('teams')">Teams (${c.teams.length})</button>
      <button class="tab" data-tab="conflicts" onclick="setPRTab('conflicts')">Conflicts (${c.conflicts.length})</button>
      <button class="tab" data-tab="risk" onclick="setPRTab('risk')">Risk (${c.risk.flags.length})</button>
    </div>

    <div class="tab-body on" data-tab="reviewers">
      <div class="card">
        <h3>Recommended reviewers · ranked by DOK score across changed files</h3>
        ${recommended.length
          ? recommended.map(reviewerRow).join("")
          : `<div class="rail-empty">No active engineers found with prior history on these files. This PR may be fresh-territory work.</div>`}
      </div>
      ${departedRev.length ? `<div class="card">
        <h3>⚠ Has history but departed</h3>
        <div class="w-sub" style="margin-bottom:8px">These engineers wrote significant parts of the changed code but are no longer at Alpaca. Useful context only.</div>
        ${departedRev.map(reviewerRow).join("")}
      </div>` : ""}
    </div>

    <div class="tab-body" data-tab="files">
      <div class="card">
        <h3>Changed files · click to drill into Codetective</h3>
        ${c.files.map(fileMiniCard).join("")}
      </div>
    </div>

    <div class="tab-body" data-tab="teams">
      <div class="card">
        <h3>Team breakdown</h3>
        ${c.teams.length
          ? c.teams.map(teamRow).join("")
          : `<div class="rail-empty">No team ownership data</div>`}
        ${c.teams.length > 1 ? `<div class="w-sub" style="margin-top:10px;padding:10px;background:var(--bg);border-radius:6px">⚠ Cross-team PR. Consider posting in each team's primary Slack channel.</div>` : ""}

    <div class="tab-body" data-tab="conflicts">
      <div class="card">
        <h3>Other open PRs touching the same files</h3>
        ${c.conflicts.length
          ? c.conflicts.map(conflictRow).join("")
          : `<div class="rail-empty">No conflicting PRs in flight.</div>`}
      </div>
    </div>

    <div class="tab-body" data-tab="risk">
      <div class="card">
        <h3>Risk flags</h3>
        ${c.risk.flags.length
          ? c.risk.flags.map(riskFlagRow).join("")
          : `<div class="rail-empty">No risk flags raised.</div>`}

// Hydrate a (possibly partial) case dict with safe defaults so render() can
// always count on every key existing. Tracks `_stages` so render() can show
// "loading" placeholders for cards whose data hasn't arrived yet.
function withDefaults(c) {
  c = c || {};
  const stages = c._stages || {};
  return {
    path: c.path || "",
    range: c.range || "",
    similar: c.similar || [],
    contributors: c.contributors || [],
    timeline: c.timeline || [],
    openPr: c.openPr || null,
    latestPr: c.latestPr || null,
    jira: c.jira || null,
    mergedPrs: c.mergedPrs || {"30d":{count:0,prs:[],degraded:false},"90d":{count:0,prs:[],degraded:false}},
    evidence: c.evidence || [],
    why: c.why || [],
    context: c.context || [],
    nextStep: c.nextStep || null,
    activitySummary: c.activitySummary || "",
    purpose: c.purpose || "",
    decisions: Array.isArray(c.decisions) ? c.decisions : [],
    gotchas: c.gotchas || [],
    model: c.model || "",
    timelineNotes: c.timelineNotes || [],
    summary: { title: c.summary?.title || "Loading…", copy: c.summary?.copy || "" },
    team: {
      lane: c.team?.lane || "",
      activity: c.team?.activity || "",
      confidence: c.team?.confidence || "—",
      inferred: c.team?.inferred || false,
      inferred_from: c.team?.inferred_from,
    },
    routing: c.routing || {},
    sources: {
      codeowners: c.sources?.codeowners,
      commits_scanned: c.sources?.commits_scanned ?? 0,
      open_prs: c.sources?.open_prs ?? 0,
      gh_degraded: c.sources?.gh_degraded || false,
      llm_used: c.sources?.llm_used || false,
      vector_index: c.sources?.vector_index ?? 0,
    },
    _stages: stages,
  };
}

let activeTab = "overview";
const _VALID_TABS = new Set(["overview", "contributors", "activity", "why"]);
function setTab(t) {
  if (!_VALID_TABS.has(t)) t = "overview";
  activeTab = t;
  document.querySelectorAll(".tab").forEach(el => el.classList.toggle("on", el.dataset.tab === t));
  document.querySelectorAll(".tab-body").forEach(el => el.classList.toggle("on", el.dataset.tab === t));
}

function loadingRow(label) {
  return `<div class="placeholder-row"><span class="mini-spin"></span>${esc(label)}<span class="elapsed-timer"></span></div>`;
}

let _elapsedTick = null;
function startElapsedTicker() {
  state.streamStart = Date.now();
  if (_elapsedTick) clearInterval(_elapsedTick);
  const tick = () => {
    const s = ((Date.now() - state.streamStart) / 1000).toFixed(1);
    document.querySelectorAll(".elapsed-timer").forEach(el => el.textContent = s + "s");
  };
  tick();
  _elapsedTick = setInterval(tick, 200);
}
function stopElapsedTicker() {
  if (_elapsedTick) { clearInterval(_elapsedTick); _elapsedTick = null; }
}

function narrativeCardHtml(c, stages) {
  const header = `<h3 style="display:flex;align-items:center;justify-content:space-between;gap:10px"><span>Code context</span>${aiBadgeHtml(c, stages)}</h3>`;
  if (!stages.narrative) {
    return `${header}${loadingRow("Reading code + recent commits…")}`;
  }
  if (!c.sources?.llm_used) {
    const modelHint = state.modelName || "qwen2.5-coder:7b";
    return `
      ${header}
      <div class="rail-empty" style="padding:14px 12px;line-height:1.5">
        <strong>No local LLM active.</strong><br>
        Start Ollama and pull a model to see code-context narrative:
        <code style="display:block;margin-top:8px;font-size:12px;color:var(--dim)">brew services start ollama && ollama pull ${esc(modelHint)}</code>
      </div>`;
  }
  const purpose = (c.purpose || "").trim();
  const decisions = (c.decisions || []).filter(d => d && (d.claim || "").trim());
  const gotchas = (c.gotchas || []).filter(Boolean);
  if (!purpose && !decisions.length && !gotchas.length) {
    return `${header}<div class="rail-empty">No business context found in Jira tickets, commits, or code comments for this path.</div>`;
  }
  const decisionsHtml = decisions.length ? `
    <div style="margin-top:10px">
      ${decisions.map(d => `
        <div style="margin:8px 0 10px;padding-left:10px;border-left:2px solid var(--border)">

  return `
    ${header}
    ${purpose ? `<p class="narrative" style="line-height:1.55">${esc(purpose)}</p>` : ""}

    ${gotchas.length ? `<ul class="bullets" style="margin-top:10px">${gotchas.map(g => `<li>⚠ ${esc(g)}</li>`).join("")}</ul>` : ""}
  `;
}

// ---- code snippet preview (the actual lines being investigated) ----
function codeSnippetCardHtml(c) {
  const range = c.range || "";
  const meta = range
    ? `<span>L${esc(range)}</span>`
    : `<span>preview</span><span style="color:var(--faint)">· first lines</span>`;
  return `
    <div class="code-card-head">
      <div class="code-meta"><strong>Code</strong>${meta}</div>
      <button class="code-toggle" id="code-toggle" onclick="toggleCodeSnippet()">Show</button>
    </div>
    <div id="code-block-wrap" style="display:none"></div>`;
}

function toggleCodeSnippet() {
  const wrap = document.getElementById("code-block-wrap");
  const btn  = document.getElementById("code-toggle");
  if (!wrap || !btn) return;
  const hidden = wrap.style.display === "none";
  wrap.style.display = hidden ? "" : "none";
  btn.textContent = hidden ? "Hide" : "Show";
  if (hidden && !wrap.dataset.loaded) {
    wrap.innerHTML = `<div class="code-empty"><span class="mini-spin"></span> loading file…</div>`;
    const path  = wrap.dataset.path;
    const range = wrap.dataset.range || "";
    if (path) loadCodeSnippet(path, range);
  }
}

async function loadCodeSnippet(path, range) {
  const wrap = document.getElementById("code-block-wrap");
  if (!wrap) return;
  wrap.dataset.loaded = "1";
  try {
    const res = await fetch(`/file?path=${encodeURIComponent(path)}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const lines = data.lines || [];
    if (!lines.length) { wrap.innerHTML = `<div class="code-empty">File is empty.</div>`; return; }

    let start = 1, end = lines.length;
    let hlStart = 0, hlEnd = 0;
    if (range) {
      const m = range.match(/^(\d+)(?:-(\d+))?$/);
      if (m) {
        hlStart = parseInt(m[1], 10);
        hlEnd   = m[2] ? parseInt(m[2], 10) : hlStart;
        // Show ~5 lines of context around the range, capped at 60 visible lines.
        const pad = 5;
        start = Math.max(1, hlStart - pad);
        end   = Math.min(lines.length, hlEnd + pad);
        if (end - start + 1 > 60) end = start + 59;
      }
    } else {
      end = Math.min(lines.length, 30);
    }

    const rows = [];
    for (let i = start; i <= end; i++) {
      const txt = lines[i - 1] ?? "";
      const isHl = hlStart && i >= hlStart && i <= hlEnd;
      rows.push(`<div class="ln${isHl ? " hl" : ""}"><span class="ln-no">${i}</span><span class="ln-tx">${esc(txt) || "&nbsp;"}</span></div>`);
    }
    wrap.innerHTML = `<pre class="code-block">${rows.join("")}</pre>`;
  } catch (e) {
    wrap.innerHTML = `<div class="code-empty">Couldn't load file (${esc(String(e.message || e))}).</div>`;
  }
}

// One-time DOM scaffold; subsequent stage events update only the affected ids.
function renderShell(c, stages) {
  return `
    <div class="head-card">
      <div class="head-row" id="sec-head-row">${headerActionsHtml(c, stages)}</div>
      <div class="team-line" id="sec-team-line">${teamLineHtml(c)}</div>
      <div class="pills" id="sec-pills">${pillsRowHtml(c, stages)}</div>
      <div id="sec-routing-strip">${routingStrip(c.routing)}</div>
    </div>

    <div class="code-card" id="sec-code-snippet">${codeSnippetCardHtml(c)}</div>

    <div class="tabs">
      <button class="tab" data-tab="overview" onclick="setTab('overview')">Overview</button>
      <button class="tab" data-tab="contributors" onclick="setTab('contributors')" id="tab-btn-contributors">${tabsContribLabel(c, stages)}</button>
      <button class="tab" data-tab="activity" onclick="setTab('activity')" id="tab-btn-activity">${tabsActivityLabel(c, stages)}</button>
      <button class="tab" data-tab="why" onclick="setTab('why')">Why &amp; sources</button>
    </div>

    <div class="tab-body" data-tab="overview">
      <div class="card" id="sec-narrative">${narrativeCardHtml(c, stages)}</div>
      <div class="grid-2">
        <div class="card" id="sec-top-contrib">${topContribCardHtml(c, stages)}</div>
        <div class="card" id="sec-latest-activity">${latestActivityCardHtml(c, stages)}</div>
      </div>
      <div class="card" id="sec-next-step">${nextStepCardHtml(c, stages)}</div>
    </div>

    <div class="tab-body" data-tab="contributors">
      <div class="card" id="sec-contributors-list">${contributorsListCardHtml(c, stages)}</div>
    </div>

    <div class="tab-body" data-tab="activity">
      <div class="card" id="sec-activity-summary">${activitySummaryCardHtml(c, stages)}</div>
      <div class="card" id="sec-open-work">${openWorkCardHtml(c, stages)}</div>
      <div class="card" id="sec-recent-commits">${recentCommitsCardHtml(c, stages)}</div>
      <div id="sec-merged-wrap">${mergedSectionWrapHtml(c, stages)}</div>
      <div id="sec-evidence-wrap">${evidenceWrapHtml(c, stages)}</div>
    </div>

    <div class="tab-body" data-tab="why">
      <div class="card" id="sec-routing">${routingCardHtml(c)}</div>
      <div class="card" id="sec-why">${whyCardHtml(c, stages)}</div>
      <div class="card" id="sec-ownership-signals">${ownershipSignalsCardHtml(c)}</div>
      <div class="card" id="sec-sources">${sourcesCardHtml(c, stages)}</div>
    </div>
  `;
}

// In-place DOM patcher: skips work if html is unchanged, flashes only on real change.
function setHTML(id, html) {
  const el = document.getElementById(id);
  if (!el) return false;
  if (el.innerHTML === html) return false;
  el.innerHTML = html;
  el.classList.remove("flash-in");
  void el.offsetWidth;  // restart animation
  el.classList.add("flash-in");
  return true;
}

// `justArrived` is the stage name from the latest stream event (or undefined for
// a full repaint, e.g. on cache load). We only re-render sections that depend on
// the arrived stage, so individual cards light up instead of the whole pane.
function render(c, justArrived) {
  const stages = c._stages || {};
  const key = `${c.path}|${c.range||""}`;

  // Left rail — cheap, always update; setHTML no-ops when unchanged.
  const sim = similarRailHtml(c);
  if (sim) {
    $("similar-section").style.display = "block";
    setHTML("similar", sim);
  } else {
    $("similar-section").style.display = "none";
  }

  // First time we render this path/range pair — paint the whole shell.
  if (state._renderKey !== key || !document.getElementById("sec-pills")) {
    state._renderKey = key;
    $("pane-body").innerHTML = renderShell(c, stages);
    setTab(activeTab);
    const wrap = document.getElementById("code-block-wrap");
    if (wrap) { wrap.dataset.path = c.path; wrap.dataset.range = c.range || ""; }
    return;
  }

  // Shell stage carries owner/team/routing for sections specific to it.
  // (sec-team-line is updated unconditionally below since later stages can also
  // refine summary/team data.)
  if (!justArrived || justArrived === "shell") {
    setHTML("sec-head-row", headerActionsHtml(c, stages));
    setHTML("sec-routing-strip", routingStrip(c.routing));
    setHTML("sec-routing", routingCardHtml(c));
    setHTML("sec-ownership-signals", ownershipSignalsCardHtml(c));
  }
  if (!justArrived || justArrived === "contributors") {
    const tabC = document.getElementById("tab-btn-contributors");
    if (tabC) tabC.textContent = tabsContribLabel(c, stages);
    const tabA = document.getElementById("tab-btn-activity");
    if (tabA) tabA.textContent = tabsActivityLabel(c, stages);
    setHTML("sec-top-contrib", topContribCardHtml(c, stages));
    setHTML("sec-latest-activity", latestActivityCardHtml(c, stages));
    setHTML("sec-contributors-list", contributorsListCardHtml(c, stages));
    setHTML("sec-recent-commits", recentCommitsCardHtml(c, stages));
  }
  if (!justArrived || justArrived === "github") {
    setHTML("sec-latest-activity", latestActivityCardHtml(c, stages));  // open PR appears here
    setHTML("sec-open-work", openWorkCardHtml(c, stages));
    setHTML("sec-merged-wrap", mergedSectionWrapHtml(c, stages));
    setHTML("sec-evidence-wrap", evidenceWrapHtml(c, stages));
  }
  if (!justArrived || justArrived === "narrative") {
    setHTML("sec-head-row", headerActionsHtml(c, stages));  // model name swaps in
    setHTML("sec-narrative", narrativeCardHtml(c, stages));
    setHTML("sec-next-step", nextStepCardHtml(c, stages));
    setHTML("sec-activity-summary", activitySummaryCardHtml(c, stages));
    setHTML("sec-recent-commits", recentCommitsCardHtml(c, stages));  // includes per-commit notes
    setHTML("sec-why", whyCardHtml(c, stages));
  }

  // These three depend on data that arrives across multiple stages (team name
  // becomes available in shell OR contributors; confidence in contributors;
  // pill counts in every stage). Cheap to recompute every event — setHTML
  // no-ops when the string is identical, so this only flashes on real change.
  setHTML("sec-team-line", teamLineHtml(c));
  setHTML("sec-pills", pillsRowHtml(c, stages));
  setHTML("sec-sources", sourcesCardHtml(c, stages));
}

function confColor(c) { return c==="High"?"green":c==="Med"?"amber":"rose"; }

function scoreTooltip(p) {
  const b = p.score_breakdown || {};
  return `score=${p.score ?? 0}\nblame_share=${b.blame_share ?? 0}\nrecency=${b.recency ?? 0}\nauthorship=${b.authorship ?? 0}\nvolume=${b.volume ?? 0}${b.departed ? "\ndeparted=true" : ""}`;
}

function scorePill(p) {
  return p.score === undefined ? "" : `<span class="contrib-score" title="${esc(scoreTooltip(p))}">${p.score}</span>`;
}

function ghHandle(p) {
  if (!p.github) return "";
  const url = p.github_url || `https://github.com/${p.github}`;
  return ` <a class="gh-handle" href="${esc(url)}" target="_blank" rel="noopener" title="GitHub profile" onclick="event.stopPropagation()">@${esc(p.github)}</a>`;
}

function contribOverview(p) {
  return `<div class="contrib-head">
    ${avatar(p)}
    <div class="contrib-meta">
      <div class="contrib-name">${esc(p.name)}${ghHandle(p)}</div>
      <div class="contrib-role">${esc(p.role)}${scorePill(p)} · ${esc(p.when)}</div>
    </div>
  </div>`;
}

function contribCard(p,i) {
  const cls = "contrib-card" + ((p.is_departed || p.status === "departed") ? " departed" : "");
  let badge = "";
  if (p.status === "departed")    badge = `<span class="contrib-badge left">Left Alpaca</span>`;
  else if (p.still_on_team)       badge = `<span class="contrib-badge team">Current member</span>`;
  return `<div class="${cls}">
    <div class="contrib-head">
      ${avatar(p)}
      <div class="contrib-meta">
        <div class="contrib-name">${esc(p.name)}${ghHandle(p)}${badge}</div>
        <div class="contrib-role">${esc(p.role)}${scorePill(p)} · ${esc(p.when)}</div>
      </div>
      <div class="contrib-stats">${p.lines||0} lines</div>
    </div>
  </div>`;
}

function avatar(p) {
  const dot = p.still_on_team ? `<span class="av-dot" title="Still on the owning team"></span>`
            : p.status === "departed" ? `<span class="av-dot bg" title="Left Alpaca" style="background:#9ca3af"></span>`
            : "";
  return `<div class="av-wrap"><div class="av" style="background:${esc(p.color)}">${esc(p.initials)}</div>${dot}</div>`;
}

function mergedPills(m) {
  if (!m) return "";
  const c30 = m['30d']?.count || 0;
  const c90 = m['90d']?.count || 0;
  const cls = c30 > 0 ? "green" : "gray";
  let out = `<span class="pill ${cls}" title="Merged in last 30 days">${c30} merged 30d</span>`;
  if (c90 > c30) out += `<span class="pill gray" title="Merged in last 90 days">${c90} merged 90d</span>`;
  if (m['30d']?.degraded || m['90d']?.degraded) out += `<span class="pill rose" title="Merged-PR fetch failed for one of the windows">merged degraded</span>`;
  return out;
}

function mergedSection(m) {
  if (!m) return "";
  const w30 = m['30d'] || {prs:[], count:0};
  const w90 = m['90d'] || {prs:[], count:0};
  if (!w30.count && !w90.count) return "";
  const sectionId = "merged-90d-list";
  const has90Extra = w90.count > w30.count;
  const expandToggle = has90Extra
    ? `<span class="contrib-toggle" onclick="document.getElementById('${sectionId}').classList.toggle('on')">show 90d (${w90.count} total)</span>`
    : "";
  const prs30Html = w30.prs.length
    ? w30.prs.map(p => workItem(p, "merged")).join("")
    : `<div class="rail-empty">No merged PRs in last 30 days</div>`;
  const prs90Only = w90.prs.filter(p90 => !w30.prs.find(p30 => p30.id === p90.id));
  const prs90Html = prs90Only.length
    ? prs90Only.map(p => workItem(p, "merged")).join("")
    : `<div class="rail-empty">Nothing extra in 90d window</div>`;
  return `<div class="card">
    <h3 style="display:flex;justify-content:space-between;align-items:center">
      <span>Recently merged · last 30d (${w30.count})</span>${expandToggle}
    </h3>
    ${prs30Html}
    ${has90Extra ? `<div id="${sectionId}" class="snippets" style="background:transparent;padding:0;margin-top:10px"><h3 style="margin-bottom:8px">Also in 90d window</h3>${prs90Html}</div>` : ""}
  </div>`;
}

function workItem(w, kind) {
  return `<div class="work-item" onclick="window.open('${esc(w.url)}','_blank')">
    <span class="w-badge ${kind}">${esc(w.badge)}</span>
    <div class="w-body">
      <div class="w-title">${esc(w.id)} ${esc(w.title)}</div>
      <div class="w-sub">${esc(w.meta)}</div>
    </div>
    <span class="w-arrow">↗</span>
  </div>`;
}

// Build a single timeline row for the Activity tab.
// Falls back gracefully when fields aren't present on legacy/cached cases.
function activityRow(t, note, narrativeReady) {
  const sha = t.sha || (t.copy ? t.copy.split('· ').pop() : "");
  const url = t.url || (sha ? `https://github.com/alpacahq/gobroker/commit/${sha}` : "#");
  const meta = t.copy || `${t.author || ""}${t.when ? ` · ${t.when}` : ""}${sha ? ` · ${sha}` : ""}`;
  const title = linkifyJira(esc(t.title || ""));
  const chips = [];
  if (t.pr_number) {
    chips.push(`<a class="tl-chip pr" href="https://github.com/alpacahq/gobroker/pull/${t.pr_number}" target="_blank" rel="noopener" onclick="event.stopPropagation()">PR #${t.pr_number}</a>`);
  } else if (sha) {
    chips.push(`<a class="tl-chip commit" href="${esc(url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">commit ${esc(sha)}</a>`);
  }
  for (const j of (t.jira || [])) {
    chips.push(`<a class="tl-chip" href="${esc(j.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(j.id)}</a>`);
  }
  const noteHtml = narrativeReady
    ? (note ? `<div class="tl-note">${linkifyJira(esc(note))}</div>` : "")
    : `<div class="tl-note pending"><span class="mini-spin" style="width:9px;height:9px;border-width:1.5px;margin-right:6px"></span>summarizing…</div>`;
  return `<div class="tl-row" onclick="window.open('${esc(url)}','_blank')">
    <div class="tl-date">${esc(t.date || "")}</div>
    <div class="tl-title">${title}</div>
    <div class="tl-meta">${esc(meta)}</div>
    ${chips.length ? `<div class="tl-chips">${chips.join("")}</div>` : ""}
    ${noteHtml}
  </div>`;
}

const _JIRA_RE = /\b([A-Z]{2,8}-\d+)\b/g;
function linkifyJira(escapedHtml) {
  // Operates on already-escaped HTML; safe to inject anchor tags.
  return escapedHtml.replace(_JIRA_RE,
    '<a class="tl-chip" style="margin:0 2px;vertical-align:1px" href="https://alpaca.atlassian.net/browse/$1" target="_blank" rel="noopener" onclick="event.stopPropagation()">$1</a>');
}

function nextStep(c) {
  const n = c.nextStep;
  return `<div class="next-box">
    <div class="next-title">${esc(n.title)}</div>
    <div class="next-copy">${esc(n.copy)}</div>
    ${n.url?`<a class="next-link" href="${esc(n.url)}" target="_blank" rel="noopener">${esc(n.linkLabel)}</a>`:""}
  </div>`;
}

init();
</script>
